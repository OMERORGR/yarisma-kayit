// ==================== BUSINESS LOGIC ====================
function rankCategory(cat){
  const catComps=STATE.competitors.filter(c=>c.categories.includes(cat));
  // Include both done AND active rounds in total (active round scores are real)
  const countedRounds=STATE.rounds.filter(r=>r.status==='done'||r.status==='active');
  return catComps.map(c=>{
    let total=0;
    const dq=STATE.scores.some(s=>s.competitorId===c.id&&s.disqualified);
    countedRounds.forEach(r=>{
      const sc=STATE.scores.find(s=>s.competitorId===c.id&&s.roundId===r.id);
      total+=sc?sc.finalTime:0;
    });
    return {competitor:c,total,disqualified:dq};
  }).sort((a,b)=>{
    if(a.disqualified&&!b.disqualified) return 1;
    if(!a.disqualified&&b.disqualified) return -1;
    return b.total-a.total; // highest total first
  });
}

function getFlyoffCandidates(){
  const doneRounds=STATE.rounds.filter(r=>!r.isFlyoff&&r.status==='done');
  if(doneRounds.length===0) return [];
  const allDone=STATE.rounds.filter(r=>!r.isFlyoff).every(r=>r.status==='done');
  if(!allDone) return [];
  const results=[];
  STATE.competition.categories.forEach(cat=>{
    const ranked=rankCategory(cat);
    if(ranked.length<2) return;
    const top=ranked[0];
    if(top.disqualified) return;
    // Check if multiple people have same total AND all rounds maxed
    const maxTotal=doneRounds.reduce((s,r)=>s+r.maxTime,0);
    const maxFlyers=ranked.filter(r=>Math.abs(r.total-maxTotal)<0.01&&!r.disqualified);
    if(maxFlyers.length>1) results.push({category:cat,competitors:maxFlyers.map(f=>f.competitor),reason:'max'});
    else {
      // Check tied 2nd/3rd
      if(ranked.length>=3){
        const t1=ranked[1].total,t2=ranked[2].total;
        if(Math.abs(t1-t2)<0.01&&!ranked[1].disqualified&&!ranked[2].disqualified){
          results.push({category:cat,competitors:[ranked[1].competitor,ranked[2].competitor],reason:'tied23'});
        }
      }
    }
  });
  return results;
}

function exportResults(){
  const lines=['Kategori,Sıra,Ad,Soyad,Ülke,FAI ID,Toplam Süre'];
  STATE.competition.categories.forEach(cat=>{
    const ranked=rankCategory(cat);
    ranked.forEach((rc,i)=>{
      const c=rc.competitor;
      lines.push(`${cat},${i+1},${c.name},${c.surname},${c.country||''},${c.faiId||''},${rc.total.toFixed(2)}`);
    });
  });
  downloadCSV('sonuclar.csv',lines.join('\n'));
  toast('Sonuçlar CSV olarak indirildi','info');
}

// ==================== UTILS ====================
function fmtSec(s){
  if(s===undefined||s===null||isNaN(s)) return '—';
  s=Math.round(s); // always whole seconds
  const m=Math.floor(s/60);
  const sec=s%60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtTimer(s){
  // Live timer — whole seconds only, no decimals
  s=Math.floor(s);
  const m=Math.floor(s/60);
  const sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function downloadCSV(filename,content){
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(content);
  a.download=filename;a.click();
}
function toast(msg,type='info',duration=3000){
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;el.textContent=msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>el.remove(),duration);
}

function sortTable(th){
  // simple DOM sort
  const table=th.closest('table');
  const tbody=table.querySelector('tbody');
  const idx=[...th.parentNode.children].indexOf(th);
  const asc=th.classList.contains('sort-asc');
  table.querySelectorAll('th').forEach(t=>t.classList.remove('sort-asc','sort-desc'));
  th.classList.add(asc?'sort-desc':'sort-asc');
  const rows=[...tbody.querySelectorAll('tr')];
  rows.sort((a,b)=>{
    const av=a.cells[idx]?.textContent.trim()||'';
    const bv=b.cells[idx]?.textContent.trim()||'';
    const an=parseFloat(av),bn=parseFloat(bv);
    if(!isNaN(an)&&!isNaN(bn)) return asc?bn-an:an-bn;
    return asc?bv.localeCompare(av):av.localeCompare(bv);
  });
  rows.forEach(r=>tbody.appendChild(r));
}

// ==================== REALTIME SUBSCRIPTION ====================
let SB_REALTIME_CHANNEL=null;
function setupRealtime(){
  // Supabase Realtime via WebSocket — eliminates polling
  if(SB_REALTIME_CHANNEL) return; // already connected
  try{
    const wsUrl=`wss://pbfcrplortvavqcapouy.supabase.co/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`;
    const ws=new WebSocket(wsUrl);
    let heartbeat;
    ws.onopen=()=>{
      // Join the ffco_comps channel
      ws.send(JSON.stringify({topic:'realtime:public:ffco_comps',event:'phx_join',payload:{},ref:'1'}));
      // Heartbeat every 30s to keep connection alive
      heartbeat=setInterval(()=>ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'})),30000);
      SB_REALTIME_CHANNEL=ws;
      syncOK();
    };
    ws.onmessage=(e)=>{
      try{
        const msg=JSON.parse(e.data);
        if(msg.event==='INSERT'||msg.event==='UPDATE'){
          const record=msg.payload?.record||msg.payload?.new;
          if(!record) return;
          const compId=record.id;
          // Update local cache
          if(record.data) localStorage.setItem('ffco_comp_'+compId,JSON.stringify(record.data));
          // Trigger UI update for scoreboard
          if(CURRENT_VIEW==='scoreboard'&&compId===SB_COMP_ID){
            const el=document.getElementById('sb-table');
            const sbState=loadComp(SB_COMP_ID);
            if(el&&sbState) el.innerHTML=renderSbTable(sbState);
            syncOK();
          }
          // Trigger judge view update
          if(CURRENT_VIEW==='judge'&&compId===ACTIVE_COMP_ID&&CURRENT_ROLE==='judge'){
            const oldRoundId=STATE.rounds.find(r=>r.status==='active')?.id;
            const prevData=STATE;
            STATE=record.data;
            const newRoundId=STATE.rounds.find(r=>r.status==='active')?.id;
            const flight=JUDGE_STATE.timerRunning||JUDGE_STATE.timerElapsed>0;
            if(oldRoundId!==newRoundId&&!flight){
              navigate('judge');
              if(newRoundId) toast('🏁 Yeni raund başladı!','success');
              else toast('⏹ Raund kapandı','info');
            } else if(oldRoundId!==newRoundId&&flight){
              if(newRoundId) toast('🏁 Yeni raund başladı — uçuşu tamamlayın','warn');
              else toast('⏹ Raund kapandı — uçuşu tamamlayın','warn');
            }
            // Check for approved extra flight
            const prevPending=(prevData?.extraFlightRequests||[]).filter(r=>r.judgeId===CURRENT_JUDGE_ID&&r.status==='pending');
            const nowApproved=(STATE.extraFlightRequests||[]).filter(r=>r.judgeId===CURRENT_JUDGE_ID&&r.status==='approved');
            if(prevPending.length>0&&nowApproved.length>prevPending.length){
              toast('✅ Ek uçuş talebiniz onaylandı!','success');
              navigate('judge');
            }
          }
        }
      }catch(e){}
    };
    ws.onerror=()=>{SB_REALTIME_CHANNEL=null;};
    ws.onclose=()=>{
      clearInterval(heartbeat);
      SB_REALTIME_CHANNEL=null;
      // Reconnect after 5s
      setTimeout(setupRealtime,5000);
    };
  }catch(e){SB_REALTIME_CHANNEL=null;}
}

// Fallback polling every 15s (in case Realtime is disconnected)
setInterval(async()=>{
  // Scoreboard fallback
  if(CURRENT_VIEW==='scoreboard'&&SB_COMP_ID&&!SB_REALTIME_CHANNEL){
    const rows=await sbGet('ffco_comps',`?id=eq.${SB_COMP_ID}&select=id,data,updated_at`);
    if(rows&&rows.length>0){
      const localRaw=localStorage.getItem('ffco_comp_'+SB_COMP_ID);
      const localTs=localRaw?JSON.parse(localRaw).competition?.updatedAt||'':'';
      if(rows[0].updated_at>localTs){
        localStorage.setItem('ffco_comp_'+SB_COMP_ID,JSON.stringify(rows[0].data));
        const el=document.getElementById('sb-table');
        const sbState=loadComp(SB_COMP_ID);
        if(el&&sbState) el.innerHTML=renderSbTable(sbState);
        syncOK();
      }
    }
  }
  // Judge fallback
  if(CURRENT_VIEW==='judge'&&ACTIVE_COMP_ID&&CURRENT_ROLE==='judge'&&!SB_REALTIME_CHANNEL){
    const rows=await sbGet('ffco_comps',`?id=eq.${ACTIVE_COMP_ID}&select=id,data,updated_at`);
    if(rows&&rows.length>0){
      const localRaw=localStorage.getItem('ffco_comp_'+ACTIVE_COMP_ID);
      const localTs=localRaw?JSON.parse(localRaw).competition?.updatedAt||'':'';
      if(rows[0].updated_at>localTs){
        const oldRoundId=STATE.rounds.find(r=>r.status==='active')?.id;
        const prevData=STATE;
        localStorage.setItem('ffco_comp_'+ACTIVE_COMP_ID,JSON.stringify(rows[0].data));
        STATE=rows[0].data;
        const newRoundId=STATE.rounds.find(r=>r.status==='active')?.id;
        const flight=JUDGE_STATE.timerRunning||JUDGE_STATE.timerElapsed>0;
        if(oldRoundId!==newRoundId&&!flight){
          navigate('judge');
          if(newRoundId) toast('🏁 Yeni raund başladı!','success');
          else toast('⏹ Raund kapandı','info');
        } else if(oldRoundId!==newRoundId&&flight){
          if(newRoundId) toast('🏁 Yeni raund başladı — uçuşu tamamlayın','warn');
          else toast('⏹ Raund kapandı — uçuşu tamamlayın','warn');
        }
        const prevPending=(prevData?.extraFlightRequests||[]).filter(r=>r.judgeId===CURRENT_JUDGE_ID&&r.status==='pending');
        const nowApproved=(STATE.extraFlightRequests||[]).filter(r=>r.judgeId===CURRENT_JUDGE_ID&&r.status==='approved');
        if(prevPending.length>0&&nowApproved.length>prevPending.length){
          toast('✅ Ek uçuş talebiniz onaylandı!','success');
          navigate('judge');
        }
      }
    }
  }
  // Update realtime connection indicator
  const dot=document.getElementById('syncDot');
  if(dot) dot.title=SB_REALTIME_CHANNEL?'🟢 Realtime bağlı':'🟡 Polling modu';
},15000);

// Start Realtime on load
setTimeout(setupRealtime,1000);
