<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FFCO – Free Flight Competition Organizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06091200;
  --bg1: #060912;
  --bg2: #0b1220;
  --bg3: #101b2e;
  --bg4: #19263d;
  --border: #1e2e48;
  --border2: #2a3d5a;
  --text: #dde8f5;
  --text2: #8a9bb5;
  --text3: #5a6e8a;
  --blue: #00c8ff;
  --blue2: #0096cc;
  --blue-glow: rgba(0,200,255,0.15);
  --gold: #f5a623;
  --gold2: #c47d0e;
  --green: #00e87a;
  --green2: #00b85f;
  --red: #ff4757;
  --red2: #cc2233;
  --purple: #9b6dff;
  --orange: #ff7043;
  --r: 14px;
  --r2: 10px;
  --r3: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.6);
  --shadow2: 0 4px 16px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:var(--bg1);color:var(--text);font-family:'Syne',sans-serif;overflow-x:hidden;}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* LAYOUT */
.app-shell{display:flex;flex-direction:column;min-height:100vh;}

/* HEADER */
.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:60px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--blue);letter-spacing:2px;white-space:nowrap;}
.topbar-logo span{color:var(--gold);}
.topbar-comp{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topbar-nav{display:flex;gap:4px;}
.nav-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.nav-btn:hover{border-color:var(--blue);color:var(--blue);}
.nav-btn.active{background:var(--blue);border-color:var(--blue);color:#000;font-weight:700;}
.topbar-role{padding:5px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border2);font-size:11px;color:var(--gold);font-weight:600;letter-spacing:.5px;cursor:pointer;white-space:nowrap;}

/* MAIN */
.main{flex:1;padding:24px;max-width:1280px;margin:0 auto;width:100%;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow2);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);letter-spacing:.5px;display:flex;align-items:center;gap:8px;}
.card-title .icon{font-size:16px;}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--bg1);color:var(--blue);box-shadow:var(--shadow2);}
.tab:hover:not(.active){color:var(--text);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r3);border:1px solid transparent;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.3px;white-space:nowrap;}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#000;}
.btn-primary:hover{background:var(--blue2);border-color:var(--blue2);}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);}
.btn-green{background:var(--green);border-color:var(--green);color:#000;}
.btn-green:hover{background:var(--green2);}
.btn-red{background:var(--red);border-color:var(--red);color:#fff;}
.btn-red:hover{background:var(--red2);}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* FORMS */
.form-group{margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase;}
input,select,textarea{width:100%;padding:10px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;transition:border-color .15s;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
input[type=checkbox]{width:auto;accent-color:var(--blue);}
select option{background:var(--bg3);}
textarea{resize:vertical;min-height:80px;}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px;}

/* CHECKBOXES */
.check-group{display:flex;flex-wrap:wrap;gap:8px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);}
.check-item{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.check-item input{width:14px;height:14px;}
.check-item.checked{border-color:var(--blue);background:rgba(0,200,255,0.08);color:var(--blue);}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.5px;}
.badge-blue{background:rgba(0,200,255,0.15);color:var(--blue);}
.badge-gold{background:rgba(245,166,35,0.15);color:var(--gold);}
.badge-green{background:rgba(0,232,122,0.15);color:var(--green);}
.badge-red{background:rgba(255,71,87,0.15);color:var(--red);}
.badge-purple{background:rgba(155,109,255,0.15);color:var(--purple);}
.badge-gray{background:var(--bg4);color:var(--text2);}

/* TABLES */
.tbl-wrap{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg3);color:var(--text2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;text-align:left;white-space:nowrap;}
td{padding:10px 14px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:var(--bg3);}
th.sort-asc::after{content:' ▲';}
th.sort-desc::after{content:' ▼';}
th[data-sort]{cursor:pointer;}
th[data-sort]:hover{color:var(--blue);}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}

/* STAT BOXES */
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-val{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--text);}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px;}

/* ALERTS */
.alert{padding:12px 16px;border-radius:var(--r3);font-size:13px;margin-bottom:14px;border-left:3px solid;}
.alert-info{background:rgba(0,200,255,0.08);border-color:var(--blue);color:var(--blue);}
.alert-warn{background:rgba(245,166,35,0.08);border-color:var(--gold);color:var(--gold);}
.alert-success{background:rgba(0,232,122,0.08);border-color:var(--green);color:var(--green);}
.alert-error{background:rgba(255,71,87,0.08);border-color:var(--red);color:var(--red);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{width:30px;height:30px;border:none;background:var(--bg4);border-radius:6px;cursor:pointer;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{color:var(--red);}
.modal-body{padding:20px 22px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}

/* TIMER PANEL (Judge) */
.timer-hero{text-align:center;padding:32px 20px;}
.timer-display{font-family:'Space Mono',monospace;font-size:80px;font-weight:700;color:var(--blue);letter-spacing:4px;line-height:1;text-shadow:0 0 40px rgba(0,200,255,0.4);}
.timer-display.running{animation:pulse 1s infinite;}
.timer-display.stopped{color:var(--gold);}
.timer-display.saved{color:var(--green);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.8;}}
.timer-controls{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;}
.timer-btn{padding:14px 32px;border-radius:12px;border:none;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .15s;min-width:120px;}
.timer-start{background:var(--green);color:#000;box-shadow:0 0 20px rgba(0,232,122,0.3);}
.timer-start:hover{background:var(--green2);}
.timer-stop{background:var(--gold);color:#000;box-shadow:0 0 20px rgba(245,166,35,0.3);}
.timer-stop:hover{background:var(--gold2);}
.timer-save{background:var(--blue);color:#000;box-shadow:0 0 20px rgba(0,200,255,0.3);}
.timer-save:hover{background:var(--blue2);}
.timer-reset{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.timer-reset:hover{color:var(--red);}
.competitor-chip{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--bg3);border:2px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .15s;margin-bottom:8px;}
.competitor-chip:hover{border-color:var(--blue);}
.competitor-chip.selected{border-color:var(--blue);background:rgba(0,200,255,0.08);}
.competitor-chip.scored{border-color:var(--green);background:rgba(0,232,122,0.05);}
.competitor-chip.scored .chip-time{color:var(--green);}
.chip-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);width:30px;}
.chip-name{flex:1;font-size:14px;font-weight:600;}
.chip-cats{display:flex;gap:4px;}
.chip-time{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--text2);}

/* SCOREBOARD */
.sb-header{text-align:center;padding:32px 20px 20px;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%);}
.sb-comp-name{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--blue);margin-bottom:6px;text-shadow:0 0 30px rgba(0,200,255,0.3);}
.sb-date{font-size:13px;color:var(--text2);margin-bottom:20px;}
.sb-category-tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.sb-cat-btn{padding:7px 16px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .15s;}
.sb-cat-btn.active{border-color:var(--gold);background:rgba(245,166,35,0.1);color:var(--gold);}
.rank-1 td:first-child{color:var(--gold);font-size:16px;}
.rank-2 td:first-child{color:#c0c0c0;font-size:15px;}
.rank-3 td:first-child{color:#cd7f32;font-size:14px;}
.rank-row td:first-child{font-family:'Orbitron',monospace;font-weight:700;}

/* ROUND STATUS */
.round-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.round-card.active{border-color:var(--green);background:rgba(0,232,122,0.05);}
.round-card.done{opacity:.6;}
.round-num{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--text2);width:80px;}
.round-time{font-family:'Space Mono',monospace;font-size:13px;color:var(--text);}
.round-status{margin-left:auto;}

/* LANE VISUAL */
.lane-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.lane-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;}
.lane-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.lane-num{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--blue);}
.lane-judges{font-size:11px;color:var(--text3);margin-bottom:8px;}
.lane-comp{padding:5px 8px;background:var(--bg4);border-radius:5px;font-size:12px;margin-bottom:4px;}

/* LANDING */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;gap:32px;}
.landing-logo{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:var(--blue);text-shadow:0 0 60px rgba(0,200,255,0.3);letter-spacing:6px;}
.landing-logo span{color:var(--gold);}
.landing-sub{font-size:15px;color:var(--text2);max-width:480px;line-height:1.7;}
.role-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;max-width:1000px;width:100%;}
.role-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:28px 20px;cursor:pointer;transition:all .2s;text-align:center;}
.role-card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,200,255,0.1);}
.role-icon{font-size:40px;margin-bottom:14px;}
.role-name{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:1px;}
.role-desc{font-size:12px;color:var(--text2);line-height:1.5;}

/* PIN SCREEN */
.pin-screen{max-width:360px;margin:60px auto;text-align:center;}
.pin-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;margin-bottom:8px;color:var(--blue);}
.pin-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
.pin-input{text-align:center;font-family:'Space Mono',monospace;font-size:32px;letter-spacing:12px;padding:16px;background:var(--bg3);border:2px solid var(--border2);border-radius:12px;color:var(--text);width:100%;margin-bottom:16px;}
.pin-input:focus{border-color:var(--blue);}
.pin-error{color:var(--red);font-size:13px;margin-bottom:12px;}

/* SETUP WIZARD */
.wizard-steps{display:flex;gap:0;margin-bottom:28px;border-radius:var(--r2);overflow:hidden;border:1px solid var(--border);}
.wizard-step{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:600;background:var(--bg3);color:var(--text3);border-right:1px solid var(--border);transition:all .15s;}
.wizard-step:last-child{border-right:none;}
.wizard-step.done{background:rgba(0,232,122,0.08);color:var(--green);}
.wizard-step.active{background:rgba(0,200,255,0.1);color:var(--blue);}

/* PROGRESS */
.progress{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:8px;}
.progress-bar{height:100%;background:var(--blue);transition:width .3s;}

/* TOAST */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 18px;border-radius:var(--r3);font-size:13px;font-weight:600;min-width:220px;box-shadow:var(--shadow);animation:toast-in .2s ease;border-left:4px solid;}
.toast-success{background:var(--bg2);border-color:var(--green);color:var(--green);}
.toast-error{background:var(--bg2);border-color:var(--red);color:var(--red);}
.toast-info{background:var(--bg2);border-color:var(--blue);color:var(--blue);}
.toast-warn{background:var(--bg2);border-color:var(--gold);color:var(--gold);}
@keyframes toast-in{from{transform:translateX(40px);opacity:0;}to{transform:none;opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* FLYOFF ALERT */
.flyoff-banner{background:linear-gradient(135deg,rgba(155,109,255,0.15),rgba(245,166,35,0.1));border:1px solid var(--purple);border-radius:var(--r);padding:20px;margin-bottom:20px;}
.flyoff-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--purple);margin-bottom:10px;}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:20px 0;}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5;}
.empty-text{font-size:14px;}

/* UTILS */
.flex{display:flex;} .flex-col{flex-direction:column;} .items-center{align-items:center;} .justify-between{justify-content:space-between;} .gap-2{gap:8px;} .gap-3{gap:12px;} .gap-4{gap:16px;} .flex-wrap{flex-wrap:wrap;} .flex-1{flex:1;} .mt-1{margin-top:4px;} .mt-2{margin-top:8px;} .mt-3{margin-top:12px;} .mt-4{margin-top:16px;} .mb-2{margin-bottom:8px;} .mb-3{margin-bottom:12px;} .mb-4{margin-bottom:16px;} .text-sm{font-size:12px;} .text-xs{font-size:11px;} .text-gold{color:var(--gold);} .text-blue{color:var(--blue);} .text-green{color:var(--green);} .text-red{color:var(--red);} .text-muted{color:var(--text2);} .font-mono{font-family:'Space Mono',monospace;} .font-orb{font-family:'Orbitron',monospace;} .bold{font-weight:700;} .text-center{text-align:center;} .text-right{text-align:right;} .w-full{width:100%;} .hidden{display:none !important;}

/* RESPONSIVE */
@media(max-width:768px){
  .main{padding:12px;}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  .form-row,.form-row-3{grid-template-columns:1fr;}
  .topbar-nav{display:none;}
  .timer-display{font-size:56px;}
  .landing-logo{font-size:32px;}
  .role-cards{grid-template-columns:1fr 1fr;}
  .tabs{gap:2px;}
  .tab{padding:6px 10px;font-size:12px;}
}
@media(max-width:480px){
  .role-cards{grid-template-columns:1fr;}
  .timer-display{font-size:48px;}
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="topbar-logo">FF<span>CO</span></div>
    <div class="topbar-comp" id="topbarComp">Free Flight Competition Organizer</div>
    <nav class="topbar-nav" id="topbarNav"></nav>
    <div class="topbar-role" id="topbarRole" onclick="showRoleSwitch()">🔄 Rol Değiştir</div>
    <div style="display:flex;gap:4px;margin-left:8px;align-items:center;">
      <div id="syncDot" title="Supabase sync" style="width:8px;height:8px;border-radius:50%;background:var(--border2);transition:background .3s;cursor:help;"></div>
      <button onclick="setLang('tr')" id="langTR" style="padding:4px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;" title="Türkçe">TR</button>
      <button onclick="setLang('en')" id="langEN" style="padding:4px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;" title="English">EN</button>
    </div>
  </header>
  <main class="main" id="mainContent"></main>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ==================== SUPABASE CONFIG ====================
const SB_URL = 'https://pbfcrplortvavqcapouy.supabase.co';

const SB_H = {
  'Content-Type':'application/json',
  'apikey':SB_KEY,
  'Authorization':'Bearer '+SB_KEY,
  'Prefer':'resolution=merge-duplicates'
};
async function sbGet(table,filter=''){
  try{const r=await fetch(`${SB_URL}/rest/v1/${table}${filter}`,{headers:SB_H});return r.ok?await r.json():null;}catch(e){return null;}
}
async function sbUpsert(table,data){
  try{const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:SB_H,body:JSON.stringify(data)});return r.ok;}catch(e){return false;}
}
async function sbDelete(table,filter){
  try{const r=await fetch(`${SB_URL}/rest/v1/${table}${filter}`,{method:'DELETE',headers:SB_H});return r.ok;}catch(e){return false;}
}

// ---- ADMIN ----
function loadAdmin(){try{return JSON.parse(localStorage.getItem('ffco_admin')||'null');}catch(e){return null;}}
function saveAdmin(a){
  localStorage.setItem('ffco_admin',JSON.stringify(a));
  sbUpsert('ffco_kv',{key:'admin',value:a,updated_at:new Date().toISOString()}).then(ok=>ok?syncOK():syncERR());
}
function saveAdminAcc(a){saveAdmin(a);}
function getAdmin(){return loadAdmin()||{pin:'admin1234',name:'Admin'};}

// ---- ORGANIZERS ----
function loadOrganizers(){try{return JSON.parse(localStorage.getItem('ffco_organizers')||'[]');}catch(e){return[];}}
function saveOrganizers(o){
  localStorage.setItem('ffco_organizers',JSON.stringify(o));
  sbUpsert('ffco_kv',{key:'organizers',value:o,updated_at:new Date().toISOString()}).then(ok=>ok?syncOK():syncERR());
}
function findOrgByCredentials(username,pin){
  return loadOrganizers().find(o=>o.pin===pin&&o.active!==false);
}

// ---- COMPETITION INDEX ----
function loadIndex(){try{return JSON.parse(localStorage.getItem('ffco_index')||'[]');}catch(e){return[];}}
function saveIndex(idx){
  localStorage.setItem('ffco_index',JSON.stringify(idx));
  sbUpsert('ffco_kv',{key:'index',value:idx,updated_at:new Date().toISOString()}).then(ok=>ok?syncOK():syncERR());
}

// ---- COMPETITION DATA ----
function getInitialState(compId){
  const id=compId||uid();
  return{
    competition:{id,name:'',location:'',dateStart:'',dateEnd:'',categories:[],customCategories:[],bulletinUrl:'',bulletinUrlEn:'',organizerPin:'1234',judgePrefix:'4321',createdAt:new Date().toISOString()},
    rounds:[],competitors:[],judges:[],lanes:[],scores:[],logs:[],
    setupComplete:false,extraFlightRequests:[]
  };
}
function loadComp(id){try{const s=localStorage.getItem('ffco_comp_'+id);return s?JSON.parse(s):null;}catch(e){return null;}}
function saveComp(id,state){
  localStorage.setItem('ffco_comp_'+id,JSON.stringify(state));
  const idx=loadIndex();const entry=idx.find(e=>e.id===id)||{};
  const meta={name:state.competition.name||'',organizerId:entry.organizerId||'admin',organizerName:entry.organizerName||'',dateStart:state.competition.dateStart||'',location:state.competition.location||'',archived:entry.archived||false,archivedAt:entry.archivedAt||null,createdAt:entry.createdAt||new Date().toISOString()};
  sbUpsert('ffco_comps',{id,meta,data:state,updated_at:new Date().toISOString()}).then(ok=>ok?syncOK():syncERR());
}
function deleteComp(id){
  localStorage.removeItem('ffco_comp_'+id);
  sbDelete('ffco_comps',`?id=eq.${id}`);
}

// ---- ACTIVE SESSION ----
let ACTIVE_COMP_ID=sessionStorage.getItem('ffco_active_comp')||null;
let ACTIVE_ORG_ID=sessionStorage.getItem('ffco_active_org')||null;
let CURRENT_ORG_ID=ACTIVE_ORG_ID||null;
let STATE=ACTIVE_COMP_ID?loadComp(ACTIVE_COMP_ID)||getInitialState():getInitialState();

function save(){
  if(ACTIVE_COMP_ID){
    STATE.competition.updatedAt=new Date().toISOString();
    saveComp(ACTIVE_COMP_ID,STATE);
    const idx=loadIndex();
    const entry=idx.find(e=>e.id===ACTIVE_COMP_ID);
    if(entry){entry.name=STATE.competition.name;entry.dateStart=STATE.competition.dateStart;entry.location=STATE.competition.location;}
    saveIndex(idx);
  }
}
function selectComp(id){
  ACTIVE_COMP_ID=id;sessionStorage.setItem('ffco_active_comp',id);
  STATE=loadComp(id)||getInitialState(id);
}
function createNewComp(){
  const id=uid();saveComp(id,getInitialState(id));
  const idx=loadIndex();
  const org=CURRENT_ROLE==='admin'?{id:'admin',name:'Admin'}:loadOrganizers().find(o=>o.id===ACTIVE_ORG_ID)||{id:ACTIVE_ORG_ID,name:'?'};
  idx.push({id,name:'Yeni Yarışma',dateStart:'',location:'',organizerId:org.id,organizerName:org.name,archived:false,createdAt:new Date().toISOString()});
  saveIndex(idx);return id;
}
function archiveComp(id){
  const idx=loadIndex();const e=idx.find(x=>x.id===id);
  if(e){e.archived=true;e.archivedAt=new Date().toISOString();}
  saveIndex(idx);
  const comp=loadComp(id);if(comp)saveComp(id,comp);
  if(ACTIVE_COMP_ID===id){ACTIVE_COMP_ID=null;sessionStorage.removeItem('ffco_active_comp');STATE=getInitialState();}
  navigate('comp-select');toast(t('archivedSuccess'),'info');
}
function unarchiveComp(id){
  const idx=loadIndex();const e=idx.find(x=>x.id===id);
  if(e){e.archived=false;delete e.archivedAt;}
  saveIndex(idx);const comp=loadComp(id);if(comp)saveComp(id,comp);
  navigate('comp-select');toast(t('unarchiveSuccess'),'success');
}
function hardDeleteComp(id){
  const comp=loadComp(id);const name=comp?.competition?.name||'Bu yarışma';
  if(!confirm(`"${name}" yarışmasını kalıcı olarak silmek istiyor musunuz?`)) return;
  saveIndex(loadIndex().filter(e=>e.id!==id));deleteComp(id);
  if(ACTIVE_COMP_ID===id){ACTIVE_COMP_ID=null;sessionStorage.removeItem('ffco_active_comp');STATE=getInitialState();}
  navigate('comp-select');toast(t('deleted'),'info');
}

// ---- SYNC INDICATOR ----
function syncOK(){const el=document.getElementById('syncDot');if(el){el.style.background='var(--green)';el.title='Kaydedildi ✓';setTimeout(()=>{el.style.background='var(--border2)';},2000);}}
function syncERR(){const el=document.getElementById('syncDot');if(el){el.style.background='var(--red)';el.title='Bağlantı hatası';setTimeout(()=>{el.style.background='var(--border2)';},4000);}}

// ---- STARTUP SYNC ----
async function startupSync(){
  document.getElementById('mainContent').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;"><div style="font-family:'Orbitron',monospace;font-size:16px;color:var(--blue);letter-spacing:3px;">FFCO</div><div style="width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;"></div><div style="font-size:12px;color:var(--text2);">Veriler yükleniyor...</div></div>`;
  try{
    // Sync admin & organizers (always trust Supabase for these)
    const adminRows=await sbGet('ffco_kv','?key=eq.admin');
    if(adminRows&&adminRows.length>0) localStorage.setItem('ffco_admin',JSON.stringify(adminRows[0].value));
    const orgRows=await sbGet('ffco_kv','?key=eq.organizers');
    if(orgRows&&orgRows.length>0) localStorage.setItem('ffco_organizers',JSON.stringify(orgRows[0].value));

    // Sync comps — compare updated_at timestamps, keep newer version
    const sbRows=await sbGet('ffco_comps','?select=id,meta,data,updated_at');
    if(sbRows&&sbRows.length>0){
      const idx=[];
      sbRows.forEach(r=>{
        idx.push({id:r.id,...r.meta});
        const localKey='ffco_comp_'+r.id;
        const localRaw=localStorage.getItem(localKey);
        if(!localRaw){
          // Not in local at all — take Supabase version
          localStorage.setItem(localKey,JSON.stringify(r.data));
        } else {
          // Compare timestamps
          const localData=JSON.parse(localRaw);
          const localTs=localData.competition?.updatedAt||localData.competition?.createdAt||'';
          const sbTs=r.updated_at||'';
          // Only overwrite local if Supabase is strictly newer
          if(sbTs>localTs){
            localStorage.setItem(localKey,JSON.stringify(r.data));
          }
          // Otherwise keep local (it has newer unsaved changes)
        }
      });
      // Merge index: add any local-only comps that aren't in Supabase yet
      const localIdx=JSON.parse(localStorage.getItem('ffco_index')||'[]');
      localIdx.forEach(le=>{if(!idx.find(e=>e.id===le.id))idx.push(le);});
      localStorage.setItem('ffco_index',JSON.stringify(idx));
    }

    if(ACTIVE_COMP_ID) STATE=loadComp(ACTIVE_COMP_ID)||getInitialState();
  }catch(e){toast('Supabase bağlantısı kurulamadı — yerel veri kullanılıyor','warn');}
  renderApp();
}

let CURRENT_ROLE='public'; // 'admin'|'organizer'|'judge'|'public'
let CURRENT_JUDGE_ID=null;

function checkJudgePin(pin){
  // First check local cache to find which comp this judge belongs to
  const idx=loadIndex();
  for(const entry of idx){
    const comp=loadComp(entry.id);
    if(!comp) continue;
    const j=comp.judges.find(j=>j.pin===pin);
    if(j){
      CURRENT_JUDGE_ID=j.id;
      // Always sync fresh data from Supabase on judge login
      judgeLoginWithSync(entry.id,j.id);
      return true;
    }
  }
  return false;
}
async function judgeLoginWithSync(compId,judgeId){
  CURRENT_ROLE='judge';
  CURRENT_JUDGE_ID=judgeId;
  // Show loading briefly
  document.getElementById('mainContent').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;">
      <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;"></div>
      <div style="font-size:12px;color:var(--text2);">Yarışma verisi güncelleniyor...</div>
    </div>`;
  // Sync fresh data from Supabase
  try{
    const rows=await sbGet('ffco_comps',`?id=eq.${compId}`);
    if(rows&&rows.length>0){
      localStorage.setItem('ffco_comp_'+compId,JSON.stringify(rows[0].data));
    }
  }catch(e){}
  selectComp(compId);
  navigate('judge');
}

function renderPartContent(compId){
  const ps=loadComp(compId);if(!ps) return '';
  const flightCats=['F1A','F1B','F1C','F1G','F1H','F1Q','P30','F2A','F2B','F2C','F3A','F3B','F3D','F3F'];
  if(PART_TAB==='competitors'){
    const comps=ps.competitors.filter(c=>c.categories.some(cat=>flightCats.includes(cat)));
    if(!comps.length) return `<div class="empty"><div class="empty-icon">🏅</div><div class="empty-text">${CURRENT_LANG==='en'?'No competitors registered yet':'Henüz yarışmacı kaydı yok'}</div></div>`;
    // Group by category
    const catGroups={};
    ps.competition.categories.filter(c=>flightCats.includes(c)).forEach(cat=>{
      const catComps=comps.filter(c=>c.categories.includes(cat));
      if(catComps.length>0) catGroups[cat]=catComps;
    });
    return Object.entries(catGroups).map(([cat,list])=>`
      <div class="mb-4">
        <div style="font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--blue);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);">
          ${cat} — ${list.length} ${CURRENT_LANG==='en'?'competitor':'yarışmacı'}
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>#</th>
              <th>${CURRENT_LANG==='en'?'Name':'Ad Soyad'}</th>
              <th>${CURRENT_LANG==='en'?'Country':'Ülke'}</th>
              <th>FAI ID</th>
              <th>THSF No</th>
              <th>${CURRENT_LANG==='en'?'Class':'Sınıf'}</th>
            </tr></thead>
            <tbody>
              ${list.map((c,i)=>`<tr>
                <td style="color:var(--text3)">${i+1}</td>
                <td><strong>${c.name} ${c.surname}</strong></td>
                <td>${c.country||'—'}</td>
                <td class="font-mono">${c.faiId||'—'}</td>
                <td class="font-mono">${c.thsfId||'—'}</td>
                <td>${c.senior===false?`<span class="badge badge-purple">Junior</span>`:`<span class="badge badge-gray">Senior</span>`}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`).join('');
  } else {
    // Officials: judges from system + non-flight category competitors
    const officials=ps.judges.map(j=>({name:j.name,role:j.category||'Hakem',src:'judge'}));
    const regOfficials=ps.competitors.filter(c=>c.categories.some(cat=>!flightCats.includes(cat)));
    regOfficials.forEach(c=>officials.push({name:c.name+' '+c.surname,role:c.categories.filter(cat=>!flightCats.includes(cat)).join(', '),country:c.country,src:'reg'}));
    if(!officials.length) return `<div class="empty"><div class="empty-icon">⚖️</div><div class="empty-text">${CURRENT_LANG==='en'?'No officials registered yet':'Henüz görevli kaydı yok'}</div></div>`;
    return `<div class="tbl-wrap"><table>
      <thead><tr>
        <th>#</th>
        <th>${CURRENT_LANG==='en'?'Name':'Ad Soyad'}</th>
        <th>${CURRENT_LANG==='en'?'Role':'Görev'}</th>
        <th>${CURRENT_LANG==='en'?'Country':'Ülke'}</th>
      </tr></thead>
      <tbody>
        ${officials.map((o,i)=>`<tr>
          <td style="color:var(--text3)">${i+1}</td>
          <td><strong>${o.name}</strong></td>
          <td><span class="badge badge-blue">${o.role}</span></td>
          <td>${o.country||'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  }
}

async function loadSBUsage(){
  const panel=document.getElementById('sb-usage-panel');
  if(!panel) return;
  panel.innerHTML='<div class="text-sm text-muted">Hesaplanıyor...</div>';
  try{
    // Count rows in ffco_comps
    const comps=await sbGet('ffco_comps','?select=id,data');
    const compCount=comps?comps.length:0;
    let totalBytes=0;
    if(comps) comps.forEach(c=>{totalBytes+=JSON.stringify(c.data||{}).length;});
    const kv=await sbGet('ffco_kv','?select=key,value');
    if(kv) kv.forEach(k=>{totalBytes+=JSON.stringify(k.value||{}).length;});
    const totalKB=(totalBytes/1024).toFixed(1);
    const totalMB=(totalBytes/1024/1024).toFixed(2);
    const pct=Math.min((totalBytes/1024/1024/500*100).toFixed(2),100);
    panel.innerHTML=`
      <div class="grid-2 mb-3">
        <div class="stat-box">
          <div class="stat-label">Yarışma Sayısı</div>
          <div class="stat-val" style="font-size:20px;">${compCount}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Veri Boyutu</div>
          <div class="stat-val" style="font-size:20px;">${totalKB} KB</div>
          <div class="stat-sub">${totalMB} MB</div>
        </div>
      </div>
      <div class="stat-label mb-1">Database Kullanımı (500 MB limit)</div>
      <div class="progress" style="height:10px;border-radius:5px;">
        <div class="progress-bar" style="width:${pct}%;background:${pct>80?'var(--red)':pct>50?'var(--gold)':'var(--green)'};"></div>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-top:4px;">%${pct} kullanıldı · ${(500-parseFloat(totalMB)).toFixed(0)} MB kaldı</div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px;">🟢 Realtime: ${SB_REALTIME_CHANNEL?'Bağlı (WebSocket)':'Bağlı değil (Polling)'}</div>
    `;
  }catch(e){
    panel.innerHTML='<div class="alert alert-warn">Kullanım bilgisi alınamadı</div>';
  }
}

function viewArchiveResults(compId){

    });

  openModal(`📦 ${comp.competition.name} — Arşiv Sonuçları`,html,`<button class="btn btn-primary" onclick="closeModal()">Kapat</button>`);
}
function exportArchiveCSV(compId){
  const comp=loadComp(compId);
  if(!comp) return;
  const oldState=STATE;
  STATE=comp;
  const lines=['Kategori,Sıra,Ad,Soyad,Ülke,FAI ID,Toplam Süre'];
  comp.competition.categories.forEach(cat=>{
    rankCategory(cat).forEach((rc,i)=>{
      const c=rc.competitor;
      lines.push(`${cat},${i+1},${c.name},${c.surname},${c.country||''},${c.faiId||''},${rc.total.toFixed(2)}`);
    });
  });
  STATE=oldState;
  downloadCSV(`${comp.competition.name||'arsiv'}_sonuclar.csv`,lines.join('\n'));
  toast('Arşiv CSV indirildi','info');
}

    <div class="pin-title">${isOrg?'🧑‍✈️ '+t('orgLogin'):'⏱ '+t('judgeLogin')}</div>
    <div class="pin-sub">${isOrg?t('orgPinHint'):t('judgePinHint')}</div>
    <input class="pin-input" type="password" id="pinInput" maxlength="10" placeholder="••••" autofocus
      onkeydown="if(event.key==='Enter')checkPin('${type}')">
    <div class="pin-error hidden" id="pinError">${t('wrongPin')}</div>
    <button class="btn btn-primary w-full" onclick="checkPin('${type}')">${t('login')}</button>
    <div class="mt-3 text-center"><button class="btn btn-ghost btn-sm" onclick="navigate('login-select')">${t('back')}</button></div>
    
  </div>`;
}
function checkPin(type){
  const pin=document.getElementById('pinInput').value;
  const err=document.getElementById('pinError');
  if(type==='organizer'){
    const idx=loadIndex();
    let found=false;
    for(const entry of idx){
      const comp=loadComp(entry.id);
      if(comp&&comp.competition.organizerPin===pin){found=true;break;}
    }
    if(!found&&pin===STATE.competition.organizerPin){found=true;}
    if(found){CURRENT_ROLE='organizer';navigate('comp-select');}
    else{err.classList.remove('hidden');}
  } else {
    // checkJudgePin now handles async login internally
    const found=checkJudgePin(pin);
    if(!found){err.classList.remove('hidden');}
    // If found, judgeLoginWithSync handles navigation
  }
}

    case 'competitors': return renderCompetitorsList();
    case 'judges': return renderJudgesList();

function getAllCats(){
  // Combine default CATS with any custom ones stored in state
  const custom=STATE.competition.customCategories||[];
  return [...CATS,...custom.filter(c=>!CATS.includes(c))];
}
function addCustomCat(){
  const input=document.getElementById('customCatInput');
  const val=(input.value||'').trim().toUpperCase();
  if(!val){toast('Kategori adı boş','warn');return;}
  if(!STATE.competition.customCategories) STATE.competition.customCategories=[];
  if(getAllCats().includes(val)){toast('Bu kategori zaten var','warn');return;}
  STATE.competition.customCategories.push(val);
  // Also add to selected categories
  if(!STATE.competition.categories.includes(val)) STATE.competition.categories.push(val);
  save();
  // Re-render setup
  document.getElementById('orgContent').innerHTML=renderSetupForm();
  toast(`${val} kategorisi eklendi ✓`,'success');
}
function toggleCat(cat,el){
  const cats=STATE.competition.categories;
  if(el.checked){if(!cats.includes(cat))cats.push(cat);}
  else{const i=cats.indexOf(cat);if(i>-1)cats.splice(i,1);}
  el.closest('.check-item').classList.toggle('checked',el.checked);
}
function addRound(){
  const num=STATE.rounds.filter(r=>!r.isFlyoff).length+1;
  STATE.rounds.push({id:uid(),number:num,maxTime:240,status:'pending',isFlyoff:false,startedAt:null,endedAt:null});
  save();
  document.getElementById('roundsList').innerHTML=renderRoundInputs();
  toast('Raund eklendi','info');
}
function removeRound(id){
  const idx=STATE.rounds.findIndex(r=>r.id===id);
  if(idx>-1){STATE.rounds.splice(idx,1);save();}
  document.getElementById('roundsList').innerHTML=renderRoundInputs();
}
function updateRoundTime(id,val){
  const r=STATE.rounds.find(r=>r.id===id);
  if(r){r.maxTime=parseInt(val)||240;save();}
}
function toggleBulletinHelp(){
  const el=document.getElementById('bulletin-help');
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}
function saveSetup(){
  const name=document.getElementById('sf-name').value.trim();
  if(!name){toast('Yarışma adı zorunlu','error');return;}
  const c=STATE.competition;
  c.name=name;
  c.location=document.getElementById('sf-loc').value.trim();
  c.dateStart=document.getElementById('sf-date-s').value;
  c.dateEnd=document.getElementById('sf-date-e').value;
  c.bulletinUrl=document.getElementById('sf-bulletin').value.trim();
  c.bulletinUrlEn=document.getElementById('sf-bulletin-en')?.value.trim()||'';
  const newOrgPin=document.getElementById('sf-orgpin').value.trim();
  if(newOrgPin)c.organizerPin=newOrgPin;
  STATE.setupComplete=true;
  // Register in index if not already there
  if(ACTIVE_COMP_ID){
    const idx=loadIndex();
    if(!idx.find(e=>e.id===ACTIVE_COMP_ID)){
      idx.push({id:ACTIVE_COMP_ID,name:c.name,dateStart:c.dateStart,location:c.location,createdAt:new Date().toISOString()});
    }
    saveIndex(idx);
  }
  save();
  toast('Yarışma ayarları kaydedildi ✓','success');
  updateTopbar();
}

// Check if PIN is used anywhere in any competition (except current judge being edited)
function isPinUsedGlobally(pin, excludeJudgeId=''){
  const idx=loadIndex();
  for(const entry of idx){
    const comp=loadComp(entry.id);
    if(!comp) continue;
    const conflict=comp.judges.find(j=>j.pin===pin&&j.id!==excludeJudgeId);
    if(conflict) return {comp:comp.competition.name||entry.id, judge:conflict.name};
  }
  // Also check current STATE judges
  const conflict=STATE.judges.find(j=>j.pin===pin&&j.id!==excludeJudgeId);
  if(conflict) return {comp:STATE.competition.name||'Bu yarışma', judge:conflict.name};
  return null;
}
function generateRandomPin(length=6){
  // Random alphanumeric — no sequential numbers, no ambiguous chars (0,O,I,1,l)
  const chars='23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
  let pin='';
  for(let i=0;i<length;i++) pin+=chars[Math.floor(Math.random()*chars.length)];
  return pin;
}
function generateUniquePin(){
  let pin;
  let tries=0;
  do{
    pin=generateRandomPin(6);
    tries++;
  }while(isPinUsedGlobally(pin)&&tries<100);
  return pin;
}

// --- LANE ASSIGNMENT ---
function autoAssignLanes(){
  if(STATE.competitors.length===0){toast(t('noCompetitors'),'warn');return;}
  if(STATE.judges.length===0){toast(t('noJudges'),'warn');return;}

  // 1. Önce tüm kulvarları oluştur (hakemsiz)
  const lanesDraft=[];
  let laneNum=1;
  STATE.competition.categories.forEach(cat=>{
    const catComps=STATE.competitors.filter(c=>c.categories.includes(cat));
    if(!catComps.length) return;
    const numLanes=Math.ceil(catComps.length/3);
    for(let i=0;i<numLanes;i++){
      lanesDraft.push({
        id:uid(),number:laneNum++,category:cat,
        judgeIds:[],
        baseCompetitorIds:catComps.slice(i*3,(i+1)*3).map(c=>c.id)
      });
    }
  });

  const totalLanes=lanesDraft.length;
  const totalJudges=STATE.judges.length;

  // 2. Hakem sayısı kulvar sayısından azsa imkansız
  if(totalJudges<totalLanes){
    toast(`❌ ${totalLanes} kulvar için en az ${totalLanes} hakem gerekli. Şu an ${totalJudges} hakem var — ${totalLanes-totalJudges} hakem daha ekleyin.`,'error');
    return;
  }

  // 3. Her kulvara önce 1 hakem ata (kategori önceliğine göre)
  const judgePool=[...STATE.judges]; // kopya
  const usedIdx=new Set();

  lanesDraft.forEach(lane=>{
    // Önce kategoriye özel hakem bul, yoksa genel al
    let found=-1;
    for(let i=0;i<judgePool.length;i++){
      if(usedIdx.has(i)) continue;
      if(judgePool[i].category===lane.category){found=i;break;}
    }
    if(found===-1){
      for(let i=0;i<judgePool.length;i++){
        if(usedIdx.has(i)) continue;
        if(!judgePool[i].category){found=i;break;}
      }
    }
    if(found===-1){
      // Son çare: herhangi bir atanmamış hakem
      for(let i=0;i<judgePool.length;i++){
        if(!usedIdx.has(i)){found=i;break;}
      }
    }
    if(found>-1){lane.judgeIds.push(judgePool[found].id);usedIdx.add(found);}
  });

  // 4. Kalan hakemleri 2. hakem olarak dağıt (tek hakemlilere öncelik ver)
  for(let i=0;i<judgePool.length;i++){
    if(usedIdx.has(i)) continue;
    const j=judgePool[i];
    // Bu hakem için uygun, tek hakemli ve farklı hakem olan bir kulvar bul
    const target=lanesDraft.find(l=>
      l.judgeIds.length===1 &&
      !l.judgeIds.includes(j.id) &&
      (!j.category||j.category===l.category)
    ) || lanesDraft.find(l=>
      l.judgeIds.length===1 &&
      !l.judgeIds.includes(j.id)
    );
    if(target){target.judgeIds.push(j.id);usedIdx.add(i);}
  }

  STATE.lanes=lanesDraft;
  save();

  // 5. Özet
  const with2=STATE.lanes.filter(l=>l.judgeIds.length===2).length;
  const with1=STATE.lanes.filter(l=>l.judgeIds.length===1).length;
  if(with1===0){
    toast(`${totalLanes} kulvar oluşturuldu ✓ — Tüm kulvarlar çift hakem`,'success');
  } else {
    toast(`${totalLanes} kulvar oluşturuldu ✓ — ${with2} kulvar çift hakem, ${with1} kulvar tek hakem`,'info');
  }
  document.getElementById('orgContent').innerHTML=renderLaneManager();
}

function renderLaneManager(){
  return `
  <div>
    <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
      <div class="text-sm text-muted">${STATE.lanes.length} kulvar</div>
      <div class="flex gap-2">
        <button class="btn btn-gold btn-sm" onclick="autoAssignLanes()">⚡ Yeniden Ata</button>
      </div>
    </div>
    ${STATE.lanes.length===0?`<div class="empty"><div class="empty-icon">🏟</div><div class="empty-text">Kulvar tanımlanmadı — Otomatik Ata butonuna basın</div></div>`:`
    <div class="lane-grid">
      ${STATE.lanes.map(l=>{
        const judges=l.judgeIds.map(jid=>{const j=STATE.judges.find(x=>x.id===jid);return j?j.name:'?';});
        const comps=getCompetitorsForLaneRound(l.id, STATE.rounds.find(r=>r.status==='active')?.id||null);
        return `<div class="lane-card">
          <div class="lane-header">
            <div class="lane-num">KULVAR ${l.number}</div>
            <span class="badge badge-blue">${l.category}</span>
          </div>
          <div class="lane-judges">⚖️ ${judges.join(' · ')||'Hakem atanmadı'} ${judges.length===1?'<span class="badge badge-gold">Tek Hakem</span>':judges.length===0?'<span class="badge badge-red">Hakem Yok</span>':''}</div>
          ${comps.map(c=>`<div class="lane-comp">${c.name} ${c.surname}</div>`).join('')}
        </div>`;
      }).join('')}
    </div>`}
  </div>`;
}

function getCompetitorsForLaneRound(laneId, roundId){
  const lane=STATE.lanes.find(l=>l.id===laneId);
  if(!lane) return [];
  if(!roundId) return lane.baseCompetitorIds.map(id=>STATE.competitors.find(c=>c.id===id)).filter(Boolean);
  // rotation logic
  const catLanes=STATE.lanes.filter(l=>l.category===lane.category).sort((a,b)=>a.number-b.number);
  const round=STATE.rounds.find(r=>r.id===roundId);
  if(!round) return lane.baseCompetitorIds.map(id=>STATE.competitors.find(c=>c.id===id)).filter(Boolean);
  const roundIdx=STATE.rounds.filter(r=>!r.isFlyoff).indexOf(round);
  const laneIdx=catLanes.indexOf(lane);
  const numLanes=catLanes.length;
  const shift=numLanes>=5?roundIdx*2:roundIdx;
  const sourceLaneIdx=(laneIdx-shift%numLanes+numLanes)%numLanes;
  const sourceLane=catLanes[sourceLaneIdx];
  return (sourceLane?.baseCompetitorIds||[]).map(id=>STATE.competitors.find(c=>c.id===id)).filter(Boolean);
}

function startRound(id){
  const active=STATE.rounds.find(r=>r.status==='active');
  if(active){toast('Önce aktif raund bitirin: Raund '+active.number,'warn');return;}
  const r=STATE.rounds.find(r=>r.id===id);
  if(!r) return;
  r.status='active';r.startedAt=new Date().toISOString();
  STATE.currentRoundId=id;save();
  toast(`${r.isFlyoff?'Flyoff':'Raund '+r.number} başladı! 🚀`,'success');
  document.getElementById('orgContent').innerHTML=renderRoundManager();
}
function endRound(id){
  if(!confirm('Raund bitmeden kaydedilmemiş skorlar sıfır olarak işaretlenir. Devam?')) return;
  const r=STATE.rounds.find(r=>r.id===id);
  if(!r) return;
  // Auto-zero missing scores
  STATE.competitors.forEach(c=>{
    const hasScore=STATE.scores.some(s=>s.competitorId===c.id&&s.roundId===id);
    if(!hasScore&&c.categories.some(cat=>STATE.competition.categories.includes(cat))){
      STATE.scores.push({id:uid(),competitorId:c.id,roundId:id,attempts:[],finalTime:0,confirmed:false,disqualified:false,autoZero:true});
    }
  });
  r.status='done';r.endedAt=new Date().toISOString();
  STATE.currentRoundId=null;save();
  toast(`Raund ${r.number||''} tamamlandı ✓`,'success');
  document.getElementById('orgContent').innerHTML=renderRoundManager();
}

let JUDGE_STATE={
  selectedCompetitorId:null,
  timerStart:null,timerElapsed:0,timerRunning:false,timerInterval:null,
  currentAttempt:1,attemptType:null,attemptNote:null,
  pendingScore:null,roundId:null,_pendingAutoStart:false,
  // Per-competitor attempt memory: {competitorId_roundId: {attempt, type, note}}
  attemptMemory:{}
};

// Mobile timer persistence — save/restore on page visibility change
function saveTimerState(){
  if(!JUDGE_STATE.timerRunning&&JUDGE_STATE.timerElapsed===0) return;
  // Find the round this timer belongs to
  const activeRound=STATE.rounds.find(r=>r.status==='active');
  const lastRound=STATE.rounds.filter(r=>r.status==='done').slice(-1)[0];
  const currentRoundId=JUDGE_STATE.roundId||(activeRound?.id)||lastRound?.id||null;
  localStorage.setItem('ffco_timer',JSON.stringify({
    selectedCompetitorId:JUDGE_STATE.selectedCompetitorId,
    timerStart:JUDGE_STATE.timerStart,
    timerElapsed:JUDGE_STATE.timerElapsed,
    timerRunning:JUDGE_STATE.timerRunning,
    currentAttempt:JUDGE_STATE.currentAttempt,
    attemptType:JUDGE_STATE.attemptType,
    roundId:currentRoundId,
    compId:ACTIVE_COMP_ID,
    judgeId:CURRENT_JUDGE_ID,
    savedAt:Date.now()
  }));
}
function restoreTimerState(){
  try{
    const s=localStorage.getItem('ffco_timer');
    if(!s) return;
    const ts=JSON.parse(s);
    // Only restore if same competition, same judge, saved within last 10 minutes
    if(ts.compId!==ACTIVE_COMP_ID||ts.judgeId!==CURRENT_JUDGE_ID) return;
    if(Date.now()-ts.savedAt>600000) return; // 10 min timeout
    JUDGE_STATE.selectedCompetitorId=ts.selectedCompetitorId;
    JUDGE_STATE.currentAttempt=ts.currentAttempt||1;
    JUDGE_STATE.attemptType=ts.attemptType||null;
    JUDGE_STATE.roundId=ts.roundId||null; // restore which round this flight belongs to
    if(ts.timerRunning&&ts.timerStart){
      // Recalculate elapsed time based on when it was saved
      const round=STATE.rounds.find(r=>r.status==='active')||STATE.rounds.filter(r=>r.status==='done').slice(-1)[0];
      const elapsed=(Date.now()-ts.timerStart)/1000;
      JUDGE_STATE.timerElapsed=Math.min(elapsed,round?round.maxTime:elapsed);
      JUDGE_STATE.timerStart=ts.timerStart; // keep original start so timer is accurate
      JUDGE_STATE.timerRunning=false;
      // Auto-restart timer after DOM renders
      JUDGE_STATE._pendingAutoStart=true;
      toast('🔄 Uçuş devam ediyor...','info');
    } else {
      JUDGE_STATE.timerElapsed=ts.timerElapsed||0;
      JUDGE_STATE.timerRunning=false;
      if(ts.timerElapsed>0) toast('⚠️ Durdurulmuş uçuş bulundu — kaydedin veya sıfırlayın','warn');
    }
  }catch(e){}
}
function clearTimerState(){localStorage.removeItem('ffco_timer');}
// Listen for visibility change (phone call, tab switch)
document.addEventListener('visibilitychange',()=>{if(document.hidden&&CURRENT_ROLE==='judge')saveTimerState();});
// Also save on page unload/refresh — most reliable catch for F5
window.addEventListener('beforeunload',()=>{if(CURRENT_ROLE==='judge'&&(JUDGE_STATE.timerRunning||JUDGE_STATE.timerElapsed>0))saveTimerState();});

function renderJudge(){
  const judge=STATE.judges.find(j=>j.id===CURRENT_JUDGE_ID);
  if(!judge) return '<div class="empty">Hakem bulunamadı</div>';
  if(!JUDGE_STATE.timerRunning&&!JUDGE_STATE.selectedCompetitorId) restoreTimerState();
  const activeRound=STATE.rounds.find(r=>r.status==='active');
  const compName=STATE.competition.name||'—';

  // Check for pending extra flight request for this judge
  const pendingReq=(STATE.extraFlightRequests||[]).find(r=>
    r.judgeId===CURRENT_JUDGE_ID&&r.status==='pending'&&
    r.roundId===activeRound?.id
  );
  const approvedReq=(STATE.extraFlightRequests||[]).find(r=>
    r.judgeId===CURRENT_JUDGE_ID&&r.status==='approved'&&
    r.roundId===activeRound?.id&&
    !JUDGE_STATE.attemptMemory?.[r.competitorId+'_'+r.roundId]?.used
  );

  // Schedule auto-start after DOM renders
  if(JUDGE_STATE._pendingAutoStart){
    JUDGE_STATE._pendingAutoStart=false;
    setTimeout(()=>{
      if(!JUDGE_STATE.timerRunning&&JUDGE_STATE.timerElapsed>0&&JUDGE_STATE.selectedCompetitorId){
        timerStart();
      }
    },150);
  }

  // Special case: round was closed while a flight was in progress
  const flightInProgress=JUDGE_STATE.timerElapsed>0||JUDGE_STATE.timerRunning;
  // Use saved roundId from timer state if available (survives browser refresh)
  const savedRound=JUDGE_STATE.roundId?STATE.rounds.find(r=>r.id===JUDGE_STATE.roundId):null;

  // KEY RULE: if a flight is in progress for a SPECIFIC saved round,
  // that round takes priority over whatever round is currently active.
  // This prevents round2 from overwriting an ongoing round1 flight after browser refresh.
  const workingRound=(flightInProgress&&savedRound)
    ? savedRound                              // in-progress flight → use its round
    : (activeRound||null);                    // no flight → use active round
  const roundClosed=workingRound?workingRound.status==='done':false;

  return `
  <div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <div style="flex:1;">
        <div class="font-orb text-blue" style="font-size:13px;letter-spacing:1px;">⚖️ ${judge.name}</div>
        <div class="text-sm text-muted mt-1">🏆 ${compName}</div>
      </div>
      <div>
        ${activeRound
          ?`<span class="badge badge-green">🟢 ${activeRound.isFlyoff?'Flyoff '+activeRound.flyoffNum:'Raund '+activeRound.number} · Max ${fmtSec(activeRound.maxTime)}</span>`
          :roundClosed
            ?`<span class="badge badge-gold">⚠️ Raund Kapandı</span>`
            :`<span class="badge badge-gray">⏳ ${CURRENT_LANG==='en'?'No active round':'Raund bekleniyor'}</span>`}
      </div>
      <button class="btn btn-ghost btn-sm" onclick="judgeSyncComp()" title="Sunucudan güncelle">🔄</button>
    </div>

    ${roundClosed?`<div class="alert alert-warn">⚠️ Raund organizatör tarafından kapatıldı. <strong>Devam eden uçuşunuzu kaydedebilirsiniz</strong> ancak yeni uçuş başlatamazsınız.</div>`:''}
    ${pendingReq?`
    <div class="alert alert-warn">
      ⏳ <strong>${pendingReq.competitorName}</strong> için ek uçuş talebi gönderildi — baş hakem onayı bekleniyor...
      <div style="font-size:11px;margin-top:4px;color:var(--text2)">Onaylanırsa bu ekran otomatik güncellenecek</div>
    </div>`:''}
    ${approvedReq?`
    <div class="alert alert-success">
      ✅ <strong>${approvedReq.competitorName}</strong> için ek uçuş <strong>ONAYLANDI!</strong>
      Yarışmacıyı seçip yeniden başlatın.
    </div>`:''}
    ${!workingRound&&!flightInProgress?`<div class="alert alert-warn">⏳ ${t('waitRound')}</div>`:renderJudgePanel(judge,workingRound,roundClosed)}
  </div>`;
}

async function judgeSyncComp(){
  if(!ACTIVE_COMP_ID) return;
  // If timer is running or flight in progress, block sync to avoid losing the flight
  if(JUDGE_STATE.timerRunning||JUDGE_STATE.timerElapsed>0){
    toast('⚠️ Uçuş devam ediyor — önce durdurun ve kaydedin','warn');
    return;
  }
  const rows=await sbGet('ffco_comps',`?id=eq.${ACTIVE_COMP_ID}`);
  if(rows&&rows.length>0){
    STATE=rows[0].data;
    localStorage.setItem('ffco_comp_'+ACTIVE_COMP_ID,JSON.stringify(STATE));
    toast('Güncellendi ✓','success');
    navigate('judge');
  } else {
    toast('Bağlantı hatası','error');
  }
}

function renderJudgePanel(judge,activeRound,roundClosed=false){
  const myLanes=STATE.lanes.filter(l=>l.judgeIds.includes(judge.id));
  const myCompetitors=[];
  myLanes.forEach(lane=>{
    const laneComps=getCompetitorsForLaneRound(lane.id,activeRound.id);
    laneComps.forEach(c=>{if(!myCompetitors.find(x=>x.id===c.id))myCompetitors.push({...c,laneId:lane.id});});
  });
  const sel=JUDGE_STATE.selectedCompetitorId;
  // If timer is in progress for a competitor, ensure they show even if round rotation changed
  let selComp=myCompetitors.find(c=>c.id===sel);
  if(!selComp&&sel&&(JUDGE_STATE.timerElapsed>0||JUDGE_STATE.timerRunning)){
    // Restored flight: competitor might not be in current rotation — find from full list
    const found=STATE.competitors.find(c=>c.id===sel);
    if(found) selComp={...found,_restoredFlight:true};
  }
  
  return `
  <div class="grid-2">
    <div>
      <div class="card mb-3">
        <div class="card-header"><div class="card-title"><span class="icon">👥</span>Yarışmacılarım (${myCompetitors.length})</div></div>
        ${myCompetitors.length===0?`<div class="alert alert-warn">Bu raund için size atanmış yarışmacı bulunamadı. Kulvar atamaları kontrol edin.</div>`:''}
        ${myCompetitors.map(c=>{
          const score=STATE.scores.find(s=>s.competitorId===c.id&&s.roundId===activeRound.id);
          const memKey=c.id+'_'+activeRound.id;
          const hasPendingAttempt=!!(JUDGE_STATE.attemptMemory[memKey]||
            (JUDGE_STATE.selectedCompetitorId===c.id&&JUDGE_STATE.currentAttempt>1));
          return `<div class="competitor-chip ${sel===c.id?'selected':''} ${score&&!score.autoZero?'scored':''}" onclick="selectCompetitor('${c.id}')">
            <div class="chip-cats">${c.categories.slice(0,2).map(cat=>`<span class="badge badge-blue">${cat}</span>`).join('')}</div>
            <div class="chip-name">${c.name} ${c.surname}</div>
            ${hasPendingAttempt?`<span class="badge badge-gold" style="font-size:9px;white-space:nowrap;">2.UÇUŞ</span>`:''}
            ${score&&!score.autoZero?`<div class="chip-time ${score.finalTime>=activeRound.maxTime?'text-green':''}">${fmtSec(score.finalTime)} ${score.finalTime>=activeRound.maxTime?'✅':''}</div>`:''}
          </div>`;
        }).join('')}
      </div>
      
      <div class="card">
        <div class="card-header"><div class="card-title"><span class="icon">📋</span>Bu Raund Skorları</div></div>
        ${myCompetitors.map(c=>{
          const score=STATE.scores.find(s=>s.competitorId===c.id&&s.roundId===activeRound.id);
          if(!score){
            // Round closed + no score = auto 0
            const label=roundClosed?`<span class="font-mono" style="color:var(--text3)">0:00</span><span class="text-xs text-muted" style="margin-left:4px">otomatik</span>`:`<span style="color:var(--text3)">— ${t('waiting')}</span>`;
            return `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;">
              <span style="flex:1">${c.name} ${c.surname}</span>${label}</div>`;
          }
          return `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;">
            <span style="flex:1">${c.name} ${c.surname}</span>
            <span class="font-mono ${score.finalTime>=activeRound.maxTime?'text-green':'text-gold'}">${fmtSec(score.finalTime)}</span>
            ${score.disqualified?'<span class="badge badge-red">DQ</span>':''}
            ${score.autoZero?'<span class="badge badge-gray">oto</span>':''}
            <button class="btn btn-ghost btn-sm" onclick="editScore('${score.id}')" style="padding:2px 6px">✏️</button>
          </div>`;
        }).join('')}
      </div>
    </div>
    
    <div>
      <div class="card">
        ${selComp?renderTimerPanel(selComp,activeRound,roundClosed):renderTimerEmpty()}
      </div>
    </div>
  </div>`;
}

function renderTimerEmpty(){
  return `<div class="empty"><div class="empty-icon">⏱</div><div class="empty-text">Sol taraftan yarışmacı seçin</div></div>`;
}

function renderTimerPanel(comp,round,roundClosed=false){
  const existing=STATE.scores.find(s=>s.competitorId===comp.id&&s.roundId===round.id);
  const isAutoZero=existing&&existing.autoZero===true&&existing.finalTime===0; // auto-zero can be overwritten by real score
  const elapsed=JUDGE_STATE.timerElapsed;
  const running=JUDGE_STATE.timerRunning;
  const stopped=!running&&elapsed>0;
  // Can start a new flight only if round is active (not closed)
  const canStart=!roundClosed&&!running&&elapsed===0&&(!existing||isAutoZero);

  return `
  <div>
    <div class="card-header">
      <div class="card-title"><span class="icon">⏱</span>${comp.name} ${comp.surname}</div>
      <div class="flex gap-2">
        ${comp.categories.map(cat=>`<span class="badge badge-blue">${cat}</span>`).join('')}
      </div>
    </div>

    ${roundClosed&&!running&&elapsed===0?`
      <div class="alert alert-warn mt-3">
        🔒 Raund kapatıldı — yeni uçuş başlatılamaz.
        ${existing?'':'<div class="text-sm mt-1">Bu yarışmacı için skor girilmedi.</div>'}
      </div>`:''}

    ${JUDGE_STATE.currentAttempt>1?`<div class="alert alert-warn mb-3">⚠️ Deneme Hakkı ${JUDGE_STATE.currentAttempt-1} — ${JUDGE_STATE.attemptType==='sub20'?'20sn altı uçuş':'Kaza/Çarpışma'}</div>`:''}

    <div class="timer-hero">
      <div class="timer-display ${running?'running':stopped?'stopped':''}" id="timerDisplay">${fmtTimer(elapsed)}</div>
      <div class="text-sm text-muted mt-2">Max: ${fmtSec(round.maxTime)} ${elapsed>=round.maxTime?'<span style="color:var(--green)">✅ MAX</span>':''}</div>
      ${elapsed>=round.maxTime&&stopped?'<div class="alert alert-success mt-3">🏆 Maksimum süre tamamlandı!</div>':''}
    </div>

    <div class="timer-controls">
      ${canStart?`<button class="timer-btn timer-start" id="startBtn" onclick="handleStartBtn(this)">▶ BAŞLAT</button>`:''}
      ${running?`<button class="timer-btn timer-stop" onclick="timerStop()">⏹ DURDUR</button>`:''}
      ${stopped&&(!existing||isAutoZero)?`<button class="timer-btn timer-save" onclick="timerSave('${comp.id}','${round.id}')">💾 KAYDET</button>`:''}
      ${(stopped||(existing&&!isAutoZero))?`<button class="timer-btn timer-reset" onclick="timerReset()">↺ Sıfırla</button>`:''}
    </div>

    ${(stopped||running)&&!roundClosed?`
    <div class="mt-3 card" style="background:var(--bg3);border-color:var(--border2);">
      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;">⚡ SORUN / YANLIŞ BAŞLATMA</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-ghost btn-sm" onclick="requestExtraFlight('accidental','${comp.id}','${round.id}')">🤚 Yanlış Başlattım</button>
        <button class="btn btn-ghost btn-sm" onclick="requestExtraFlight('crash','${comp.id}','${round.id}')">⚡ Kaza/Çarpışma</button>
      </div>
      <div class="form-hint mt-1">Baş hakem / jüri onayı gerektirir</div>
    </div>`:''}

    ${stopped&&elapsed<20&&elapsed>0&&JUDGE_STATE.currentAttempt===1&&!roundClosed&&!JUDGE_STATE._pendingAutoStart?`
    <div class="alert alert-warn mt-3">
      ⚠️ 20 saniyenin altında uçuş! Deneme hakkı verilebilir.
      <div class="mt-2 flex gap-2 flex-wrap">
        <button class="btn btn-gold btn-sm" onclick="grantAttempt('sub20','${comp.id}','${round.id}')">Deneme Hakkı Ver</button>
        <button class="btn btn-ghost btn-sm" onclick="timerSave('${comp.id}','${round.id}')">Kaydet (${fmtTimer(elapsed)})</button>
      </div>
    </div>`:''}

    ${JUDGE_STATE.currentAttempt===1&&!running&&!roundClosed?`
    <div class="mt-3 card" style="background:var(--bg3)">
      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;">ÇARPIŞMA / KAZA</div>
      <button class="btn btn-ghost btn-sm" onclick="grantAttempt('crash','${comp.id}','${round.id}')">⚡ Kaza/Çarpışma — Deneme Hakkı Ver</button>
    </div>`:''}

    ${existing&&!isAutoZero?`<div class="alert alert-success mt-3">✓ Kaydedildi: <strong class="font-mono">${fmtSec(existing.finalTime)}</strong>${existing.finalTime>=round.maxTime?' 🏆 MAX':''}</div>`:''}

    <div class="mt-3">
      <textarea id="judge-note" placeholder="Opsiyonel not..." style="height:50px;font-size:12px;"></textarea>
    </div>
  </div>`;
}

function selectCompetitor(id){
  // Save current attempt state for the departing competitor
  const activeRound=STATE.rounds.find(r=>r.status==='active');
  const workingRoundId=JUDGE_STATE.roundId||activeRound?.id;
  if(JUDGE_STATE.selectedCompetitorId&&workingRoundId&&JUDGE_STATE.currentAttempt>1){
    const memKey=JUDGE_STATE.selectedCompetitorId+'_'+workingRoundId;
    JUDGE_STATE.attemptMemory[memKey]={
      attempt:JUDGE_STATE.currentAttempt,
      type:JUDGE_STATE.attemptType,
      note:JUDGE_STATE.attemptNote
    };
  }
  timerReset();
  JUDGE_STATE.selectedCompetitorId=id;
  // Restore attempt state for the incoming competitor
  const newRoundId=activeRound?.id||workingRoundId;
  const memKey=id+'_'+newRoundId;
  const mem=JUDGE_STATE.attemptMemory[memKey];
  if(mem){
    JUDGE_STATE.currentAttempt=mem.attempt||1;
    JUDGE_STATE.attemptType=mem.type||null;
    JUDGE_STATE.attemptNote=mem.note||null;
  } else {
    JUDGE_STATE.currentAttempt=1;
    JUDGE_STATE.attemptType=null;
    JUDGE_STATE.attemptNote=null;
  }
  document.getElementById('mainContent').innerHTML=renderJudge();
  bindJudgeEvents();
}

function timerStart(){
  // If timer was already running and has elapsed time, ask for confirmation
  if(JUDGE_STATE.timerElapsed>0&&!JUDGE_STATE.timerRunning){
    if(!confirm('Kronometreyi sıfırlayıp yeniden başlatmak istiyor musunuz? Mevcut süre silinecek.')) return;
    JUDGE_STATE.timerElapsed=0;
    JUDGE_STATE.timerStart=null;
  }
  JUDGE_STATE.timerStart=Date.now()-JUDGE_STATE.timerElapsed*1000;
  JUDGE_STATE.timerRunning=true;
  const round=STATE.rounds.find(r=>r.status==='active')||STATE.rounds.filter(r=>r.status==='done').slice(-1)[0];
  // Track which round this flight belongs to
  if(round) JUDGE_STATE.roundId=round.id;
  let saveCounter=0;
  JUDGE_STATE.timerInterval=setInterval(()=>{
    const now=Date.now();
    JUDGE_STATE.timerElapsed=Math.min((now-JUDGE_STATE.timerStart)/1000,round?round.maxTime:9999);
    const disp=document.getElementById('timerDisplay');
    if(disp){
      disp.textContent=fmtTimer(JUDGE_STATE.timerElapsed);
      if(JUDGE_STATE.timerElapsed>=(round?.maxTime||9999)){
        disp.classList.remove('running');
        disp.style.color='var(--green)';
        disp.style.textShadow='0 0 40px rgba(0,232,122,0.5)';
        timerStop();
      }
    }
    // Save timer state to localStorage every 5 seconds (50 * 100ms)
    saveCounter++;
    if(saveCounter>=50){saveCounter=0;saveTimerState();}
  },100);
  const btn=document.querySelector('.timer-btn.timer-start');
  if(btn){btn.textContent='⏸ DURAKLATILDI';btn.className='timer-btn timer-stop';btn.onclick=timerStop;}
}

function timerStop(){
  clearInterval(JUDGE_STATE.timerInterval);
  JUDGE_STATE.timerRunning=false;
  const disp=document.getElementById('timerDisplay');
  if(disp){disp.classList.remove('running');disp.classList.add('stopped');}
  // re-render to show save button
  const round=STATE.rounds.find(r=>r.status==='active');
  const judge=STATE.judges.find(j=>j.id===CURRENT_JUDGE_ID);
  document.getElementById('mainContent').innerHTML=renderJudge();
  bindJudgeEvents();
}

function timerReset(){
  clearInterval(JUDGE_STATE.timerInterval);
  JUDGE_STATE.timerRunning=false;
  JUDGE_STATE.timerElapsed=0;
  JUDGE_STATE.timerStart=null;
  JUDGE_STATE.roundId=null;
  clearTimerState();
}

async function timerSave(compId,roundId){
  const elapsed=JUDGE_STATE.timerElapsed;
  const round=STATE.rounds.find(r=>r.id===roundId);
  const finalTime=Math.min(Math.round(elapsed), round?round.maxTime:elapsed);
  const note=document.getElementById('judge-note')?.value||'';

  // Sync latest data from Supabase before saving to get other judge's score
  try{
    const rows=await sbGet('ffco_comps',`?id=eq.${ACTIVE_COMP_ID}`);
    if(rows&&rows.length>0){
      const freshData=rows[0].data;
      // Merge fresh scores into STATE (don't overwrite whole STATE to preserve local timer)
      freshData.scores.forEach(freshScore=>{
        const localIdx=STATE.scores.findIndex(s=>s.id===freshScore.id);
        if(localIdx>-1) STATE.scores[localIdx]=freshScore;
        else STATE.scores.push(freshScore);
      });
      localStorage.setItem('ffco_comp_'+ACTIVE_COMP_ID,JSON.stringify({...freshData,scores:STATE.scores}));
    }
  }catch(e){/* offline — use local */}

  const existIdx=STATE.scores.findIndex(s=>s.competitorId===compId&&s.roundId===roundId);

  if(existIdx>-1){
    const existing=STATE.scores[existIdx];
    if(existing.autoZero&&existing.finalTime===0){
      // Overwrite auto-zero with real score
      STATE.scores[existIdx]={...existing,finalTime,autoZero:false,
        attempts:[{time:elapsed,finalTime,type:JUDGE_STATE.attemptType||'normal',
          attempt:JUDGE_STATE.currentAttempt,note,judgeId:CURRENT_JUDGE_ID}]};
      toast(`${fmtSec(finalTime)} kaydedildi ✓`,'success');
    } else if(finalTime>existing.finalTime){
      // Higher score wins
      STATE.scores[existIdx]={...existing,finalTime,
        attempts:[...existing.attempts,{time:elapsed,finalTime,
          type:JUDGE_STATE.attemptType||'normal',attempt:JUDGE_STATE.currentAttempt,
          note,judgeId:CURRENT_JUDGE_ID,replacedPrevious:existing.finalTime}]};
      STATE.logs.push({id:uid(),type:'score_higher_wins',competitorId:compId,roundId,
        prev:existing.finalTime,new:finalTime,judgeId:CURRENT_JUDGE_ID,ts:new Date().toISOString()});
      toast(`${fmtSec(finalTime)} kaydedildi ✓ (önceki: ${fmtSec(existing.finalTime)} — yüksek değer alındı)`,'success');
    } else {
      // Lower or equal — keep existing
      STATE.scores[existIdx]={...existing,
        attempts:[...existing.attempts,{time:elapsed,finalTime,type:'lower_ignored',
          attempt:JUDGE_STATE.currentAttempt,note,judgeId:CURRENT_JUDGE_ID}]};
      STATE.logs.push({id:uid(),type:'score_lower_ignored',competitorId:compId,roundId,
        kept:existing.finalTime,ignored:finalTime,judgeId:CURRENT_JUDGE_ID,ts:new Date().toISOString()});
      toast(`Mevcut skor korundu: ${fmtSec(existing.finalTime)} (${fmtSec(finalTime)} daha düşük)`,'warn');
    }
  } else {
    // First score for this competitor+round
    STATE.scores.push({id:uid(),competitorId:compId,roundId,
      attempts:[{time:elapsed,finalTime,type:JUDGE_STATE.attemptType||'normal',
        attempt:JUDGE_STATE.currentAttempt,note,judgeId:CURRENT_JUDGE_ID}],
      finalTime,confirmed:false,disqualified:false});
    toast(`${fmtSec(finalTime)} kaydedildi ✓`,'success');
  }

  save();
  timerReset();
  clearTimerState();
  delete JUDGE_STATE.attemptMemory[compId+'_'+roundId];
  JUDGE_STATE.selectedCompetitorId=null;
  JUDGE_STATE.currentAttempt=1;
  JUDGE_STATE.attemptType=null;
  JUDGE_STATE.attemptNote=null;
  document.getElementById('mainContent').innerHTML=renderJudge();
  bindJudgeEvents();
}

function grantAttempt(type,compId,roundId){
  if(JUDGE_STATE.currentAttempt>1){toast('Bu raund için zaten bir deneme hakkı kullanıldı','error');return;}
  const typeLabel=type==='sub20'?'20 saniye altı uçuş':'Kaza / Çarpışma';
  openModal('⚠️ Deneme Hakkı Ver',`
    <div class="alert alert-warn mb-3">Bu işlem <strong>geri alınamaz</strong>. Emin misiniz?</div>
    <div class="form-group"><label>Sebep</label><input value="${typeLabel}" disabled></div>
    <div class="form-group">
      <label>Açıklama (zorunlu) *</label>
      <textarea id="attempt-note" placeholder="Deneme hakkı verilme sebebini kısaca açıklayın..." style="height:80px"></textarea>
    </div>
  `,`<button class="btn btn-ghost" onclick="closeModal()">❌ İptal</button>
    <button class="btn btn-gold" onclick="confirmGrantAttempt('${type}','${compId}','${roundId}')">✅ Evet, Deneme Hakkı Ver</button>`);
  setTimeout(()=>document.getElementById('attempt-note')?.focus(),100);
}
function confirmGrantAttempt(type,compId,roundId){
  const note=document.getElementById('attempt-note')?.value.trim();
  if(!note){toast('Açıklama zorunlu — sebebi yazın','error');return;}
  JUDGE_STATE.currentAttempt=2;
  JUDGE_STATE.attemptType=type;
  JUDGE_STATE.attemptNote=note;
  timerReset();
  closeModal();
  toast('Deneme hakkı verildi — Yeni uçuş başlatılabilir','info');
  document.getElementById('mainContent').innerHTML=renderJudge();
  bindJudgeEvents();
}
function requestExtraFlight(type,compId,roundId){
  const typeLabel=type==='accidental'?'Yanlış başlatma':'Kaza/Çarpışma';
  openModal('⚡ Ek Uçuş Talebi',`
    <div class="alert alert-info mb-3">Bu talep baş hakem / jüriye iletilecek. Onaylarsa ek uçuş hakkı verilecek.</div>
    <div class="form-group"><label>Sebep</label><input value="${typeLabel}" disabled></div>
    <div class="form-group">
      <label>Açıklama *</label>
      <textarea id="efr-note" placeholder="Ne olduğunu kısaca açıklayın..." style="height:70px"></textarea>
    </div>
  `,`<button class="btn btn-ghost" onclick="closeModal()">İptal</button>
    <button class="btn btn-primary" onclick="submitExtraFlightRequest('${type}','${compId}','${roundId}')">📨 Talep Gönder</button>`);
  setTimeout(()=>document.getElementById('efr-note')?.focus(),100);
}
function submitExtraFlightRequest(type,compId,roundId){
  const note=document.getElementById('efr-note')?.value.trim();
  if(!note){toast('Açıklama zorunlu','error');return;}
  const judge=STATE.judges.find(j=>j.id===CURRENT_JUDGE_ID);
  const comp=STATE.competitors.find(c=>c.id===compId);
  const req={
    id:uid(),type,roundId,
    judgeId:CURRENT_JUDGE_ID,judgeName:judge?.name||'Hakem',
    competitorId:compId,competitorName:comp?comp.name+' '+comp.surname:'?',
    note,status:'pending',requestedAt:new Date().toISOString()
  };
  if(!STATE.extraFlightRequests) STATE.extraFlightRequests=[];
  STATE.extraFlightRequests.push(req);
  STATE.logs.push({id:uid(),type:'extra_flight_pending',competitorId:compId,roundId,judgeId:CURRENT_JUDGE_ID,note:req.note,ts:req.requestedAt});
  // Stop timer, save request
  clearInterval(JUDGE_STATE.timerInterval);
  JUDGE_STATE.timerRunning=false;
  JUDGE_STATE.timerElapsed=0;
  JUDGE_STATE.timerStart=null;
  save();closeModal();
  toast('📨 Talep gönderildi — baş hakem onayı bekleniyor...','info');
  document.getElementById('mainContent').innerHTML=renderJudge();
  bindJudgeEvents();
}
function approveExtraFlight(reqId){
  const req=STATE.extraFlightRequests?.find(r=>r.id===reqId);
  if(!req) return;
  req.status='approved';req.approvedAt=new Date().toISOString();req.approvedBy=CURRENT_ROLE;
  // Set attempt memory so judge can do second flight
  const memKey=req.competitorId+'_'+req.roundId;
  if(!JUDGE_STATE.attemptMemory) JUDGE_STATE.attemptMemory={};
  JUDGE_STATE.attemptMemory[memKey]={attempt:2,type:req.type==='accidental'?'accidental':'crash',note:'Onaylandı: '+req.note};
  // If this judge is currently logged in on same device, reset timer immediately
  if(CURRENT_JUDGE_ID===req.judgeId){
    JUDGE_STATE.currentAttempt=2;
    JUDGE_STATE.attemptType=req.type;
    JUDGE_STATE.timerElapsed=0;
    JUDGE_STATE.timerRunning=false;
    JUDGE_STATE.timerStart=null;
    clearInterval(JUDGE_STATE.timerInterval);
  }
  STATE.logs.push({id:uid(),type:'extra_flight_approved',reqId,competitorId:req.competitorId,roundId:req.roundId,judgeId:req.judgeId,note:req.note,ts:new Date().toISOString()});
  save();
  toast(`${req.competitorName} için ek uçuş onaylandı ✓`,'success');
  document.getElementById('orgContent').innerHTML=renderOverview();
}
function rejectExtraFlight(reqId){
  const req=STATE.extraFlightRequests?.find(r=>r.id===reqId);
  if(!req) return;
  req.status='rejected';req.rejectedAt=new Date().toISOString();req.rejectedBy=CURRENT_ROLE;
  STATE.logs.push({id:uid(),type:'extra_flight_rejected',reqId,ts:new Date().toISOString()});
  save();
  toast('Talep reddedildi','info');
  document.getElementById('orgContent').innerHTML=renderOverview();
}

function editScore(scoreId){
  const sc=STATE.scores.find(s=>s.id===scoreId);
  if(!sc) return;
  const c=STATE.competitors.find(x=>x.id===sc.competitorId);
  const round=STATE.rounds.find(r=>r.id===sc.roundId);
  openModal('✏️ Skor Düzenle',`
    <div class="alert alert-warn mb-3">⚠️ Skor değişikliği log'a kaydedilir ve skorbordta işaretlenir.</div>
    <div class="form-group"><label>Yarışmacı</label><input value="${c?c.name+' '+c.surname:''}" disabled></div>
    <div class="form-group"><label>Raund</label><input value="${round?'Raund '+round.number:'—'}" disabled></div>
    <div class="form-group"><label>Mevcut Süre</label><input value="${fmtSec(sc.finalTime)}" disabled></div>
    <div class="form-group"><label>Yeni Süre (saniye) *</label><input id="es-time" type="number" value="${sc.finalTime}" step="1" min="0" max="${round?round.maxTime:999}"></div>
    <div class="form-group"><label><input type="checkbox" id="es-dq" ${sc.disqualified?'checked':''}> Diskalifiye</label></div>
    <div class="form-group"><label>Değişiklik Sebebi (zorunlu) *</label><textarea id="es-note" style="height:70px" placeholder="Jüri kararı, hata düzeltmesi...">${sc.editNote||''}</textarea></div>
  `,`<button class="btn btn-ghost" onclick="closeModal()">İptal</button>
    <button class="btn btn-gold" onclick="saveEditScore('${scoreId}')">💾 Değişikliği Kaydet</button>`);
  setTimeout(()=>document.getElementById('es-time')?.focus(),100);
}
function saveEditScore(id){
  const sc=STATE.scores.find(s=>s.id===id);if(!sc) return;
  const note=document.getElementById('es-note').value.trim();
  if(!note){toast('Değişiklik sebebi zorunlu','error');return;}
  const newTime=parseInt(document.getElementById('es-time').value)||0;
  const round=STATE.rounds.find(r=>r.id===sc.roundId);
  const cappedTime=round?Math.min(newTime,round.maxTime):newTime;
  const dq=document.getElementById('es-dq').checked;
  const prevTime=sc.finalTime;
  sc.finalTime=cappedTime;sc.disqualified=dq;sc.editNote=note;
  sc.editedAt=new Date().toISOString();
  sc.juryEdited=true; // flag for scoreboard highlight
  sc.editedBy=CURRENT_ROLE==='admin'?'Admin':(STATE.judges.find(j=>j.id===CURRENT_JUDGE_ID)?.name||'Jüri');
  STATE.logs.push({id:uid(),type:'score_edit',scoreId:id,prevTime,newTime:cappedTime,dq,note,ts:new Date().toISOString(),editedBy:sc.editedBy});
  save();closeModal();
  toast(`Skor güncellendi: ${fmtSec(prevTime)} → ${fmtSec(cappedTime)}`,'success');
  // Refresh current view
  if(CURRENT_VIEW==='organizer') document.getElementById('orgContent').innerHTML=renderResultsPanel();
  else if(CURRENT_VIEW==='judge'){document.getElementById('mainContent').innerHTML=renderJudge();bindJudgeEvents();}
}

function sbSelectComp(id){SB_COMP_ID=id;SB_CAT=null;navigate('scoreboard');}
async function sbForceRefresh(){
  if(!SB_COMP_ID) return;
  const rows=await sbGet('ffco_comps',`?id=eq.${SB_COMP_ID}&select=id,data,updated_at`);
  if(rows&&rows.length>0){
    localStorage.setItem('ffco_comp_'+SB_COMP_ID,JSON.stringify(rows[0].data));
    document.getElementById('mainContent').innerHTML=renderScoreboard();
    toast('Güncellendi ✓','success');

            <td class="text-sm">${c.country||'—'}</td>

    `<div style="padding:10px 16px;font-size:11px;color:var(--orange);display:flex;align-items:center;gap:6px;">
