<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yarışma Kayıt Formu</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ee;
      --accent: #1d4ed8;
      --accent-hover: #1e40af;
      --ok: #065f46;
      --ok-bg: #ecfdf5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 920px;
      margin: 40px auto;
      padding: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    .hero {
      padding: 32px 28px 18px;
      background: linear-gradient(135deg, #eff6ff, #ffffff);
      border-bottom: 1px solid var(--line);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.15;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .lang-switch {
      display: inline-flex;
      gap: 8px;
      background: #fff;
      border: 1px solid var(--line);
      padding: 6px;
      border-radius: 12px;
    }
    .lang-switch button {
      background: transparent;
      color: var(--text);
      border: 0;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .lang-switch button.active {
      background: var(--accent);
      color: #fff;
    }
    .bullet-box {
      margin-top: 16px;
      padding: 14px 16px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 14px;
    }
