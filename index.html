<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FFCO – Free Flight Competition Organizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06091200;
  --bg1: #060912;
  --bg2: #0b1220;
  --bg3: #101b2e;
  --bg4: #19263d;
  --border: #1e2e48;
  --border2: #2a3d5a;
  --text: #dde8f5;
  --text2: #8a9bb5;
  --text3: #5a6e8a;
  --blue: #00c8ff;
  --blue2: #0096cc;
  --blue-glow: rgba(0,200,255,0.15);
  --gold: #f5a623;
  --gold2: #c47d0e;
  --green: #00e87a;
  --green2: #00b85f;
  --red: #ff4757;
  --red2: #cc2233;
  --purple: #9b6dff;
  --orange: #ff7043;
  --r: 14px;
  --r2: 10px;
  --r3: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.6);
  --shadow2: 0 4px 16px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:var(--bg1);color:var(--text);font-family:'Syne',sans-serif;overflow-x:hidden;}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* LAYOUT */
.app-shell{display:flex;flex-direction:column;min-height:100vh;}

/* HEADER */
.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:60px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--blue);letter-spacing:2px;white-space:nowrap;}
.topbar-logo span{color:var(--gold);}
.topbar-comp{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topbar-nav{display:flex;gap:4px;}
.nav-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.nav-btn:hover{border-color:var(--blue);color:var(--blue);}
.nav-btn.active{background:var(--blue);border-color:var(--blue);color:#000;font-weight:700;}
.topbar-role{padding:5px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border2);font-size:11px;color:var(--gold);font-weight:600;letter-spacing:.5px;cursor:pointer;white-space:nowrap;}

/* MAIN */
.main{flex:1;padding:24px;max-width:1280px;margin:0 auto;width:100%;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow2);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);letter-spacing:.5px;display:flex;align-items:center;gap:8px;}
.card-title .icon{font-size:16px;}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--bg1);color:var(--blue);box-shadow:var(--shadow2);}
.tab:hover:not(.active){color:var(--text);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r3);border:1px solid transparent;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.3px;white-space:nowrap;}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#000;}
.btn-primary:hover{background:var(--blue2);border-color:var(--blue2);}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);}
.btn-green{background:var(--green);border-color:var(--green);color:#000;}
.btn-green:hover{background:var(--green2);}
.btn-red{background:var(--red);border-color:var(--red);color:#fff;}
.btn-red:hover{background:var(--red2);}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* FORMS */
.form-group{margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase;}
input,select,textarea{width:100%;padding:10px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;transition:border-color .15s;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
input[type=checkbox]{width:auto;accent-color:var(--blue);}
select option{background:var(--bg3);}
textarea{resize:vertical;min-height:80px;}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px;}

/* CHECKBOXES */
.check-group{display:flex;flex-wrap:wrap;gap:8px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);}
.check-item{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.check-item input{width:14px;height:14px;}
.check-item.checked{border-color:var(--blue);background:rgba(0,200,255,0.08);color:var(--blue);}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.5px;}
.badge-blue{background:rgba(0,200,255,0.15);color:var(--blue);}
.badge-gold{background:rgba(245,166,35,0.15);color:var(--gold);}
.badge-green{background:rgba(0,232,122,0.15);color:var(--green);}
.badge-red{background:rgba(255,71,87,0.15);color:var(--red);}
.badge-purple{background:rgba(155,109,255,0.15);color:var(--purple);}
.badge-gray{background:var(--bg4);color:var(--text2);}

/* TABLES */
.tbl-wrap{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg3);color:var(--text2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;text-align:left;white-space:nowrap;}
td{padding:10px 14px;font-size:13px;border-top:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:var(--bg3);}
th.sort-asc::after{content:' ▲';}
th.sort-desc::after{content:' ▼';}
th[data-sort]{cursor:pointer;}
th[data-sort]:hover{color:var(--blue);}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}

/* STAT BOXES */
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-val{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--text);}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px;}

/* ALERTS */
.alert{padding:12px 16px;border-radius:var(--r3);font-size:13px;margin-bottom:14px;border-left:3px solid;}
.alert-info{background:rgba(0,200,255,0.08);border-color:var(--blue);color:var(--blue);}
.alert-warn{background:rgba(245,166,35,0.08);border-color:var(--gold);color:var(--gold);}
.alert-success{background:rgba(0,232,122,0.08);border-color:var(--green);color:var(--green);}
.alert-error{background:rgba(255,71,87,0.08);border-color:var(--red);color:var(--red);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{width:30px;height:30px;border:none;background:var(--bg4);border-radius:6px;cursor:pointer;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{color:var(--red);}
.modal-body{padding:20px 22px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}

/* TIMER PANEL (Judge) */
.timer-hero{text-align:center;padding:32px 20px;}
.timer-display{font-family:'Space Mono',monospace;font-size:80px;font-weight:700;color:var(--blue);letter-spacing:4px;line-height:1;text-shadow:0 0 40px rgba(0,200,255,0.4);}
.timer-display.running{animation:pulse 1s infinite;}
.timer-display.stopped{color:var(--gold);}
.timer-display.saved{color:var(--green);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.8;}}
.timer-controls{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;}
.timer-btn{padding:14px 32px;border-radius:12px;border:none;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .15s;min-width:120px;}
.timer-start{background:var(--green);color:#000;box-shadow:0 0 20px rgba(0,232,122,0.3);}
.timer-start:hover{background:var(--green2);}
.timer-stop{background:var(--gold);color:#000;box-shadow:0 0 20px rgba(245,166,35,0.3);}
.timer-stop:hover{background:var(--gold2);}
.timer-save{background:var(--blue);color:#000;box-shadow:0 0 20px rgba(0,200,255,0.3);}
.timer-save:hover{background:var(--blue2);}
.timer-reset{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.timer-reset:hover{color:var(--red);}
.competitor-chip{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--bg3);border:2px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .15s;margin-bottom:8px;}
.competitor-chip:hover{border-color:var(--blue);}
.competitor-chip.selected{border-color:var(--blue);background:rgba(0,200,255,0.08);}
.competitor-chip.scored{border-color:var(--green);background:rgba(0,232,122,0.05);}
.competitor-chip.scored .chip-time{color:var(--green);}
.chip-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);width:30px;}
.chip-name{flex:1;font-size:14px;font-weight:600;}
.chip-cats{display:flex;gap:4px;}
.chip-time{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--text2);}

/* SCOREBOARD */
.sb-header{text-align:center;padding:32px 20px 20px;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%);}
.sb-comp-name{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--blue);margin-bottom:6px;text-shadow:0 0 30px rgba(0,200,255,0.3);}
.sb-date{font-size:13px;color:var(--text2);margin-bottom:20px;}
.sb-category-tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.sb-cat-btn{padding:7px 16px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .15s;}
.sb-cat-btn.active{border-color:var(--gold);background:rgba(245,166,35,0.1);color:var(--gold);}
.rank-1 td:first-child{color:var(--gold);font-size:16px;}
.rank-2 td:first-child{color:#c0c0c0;font-size:15px;}
.rank-3 td:first-child{color:#cd7f32;font-size:14px;}
.rank-row td:first-child{font-family:'Orbitron',monospace;font-weight:700;}

/* ROUND STATUS */
.round-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.round-card.active{border-color:var(--green);background:rgba(0,232,122,0.05);}
.round-card.done{opacity:.6;}
.round-num{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--text2);width:80px;}
.round-time{font-family:'Space Mono',monospace;font-size:13px;color:var(--text);}
.round-status{margin-left:auto;}

/* LANE VISUAL */
.lane-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.lane-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;}
.lane-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.lane-num{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--blue);}
.lane-judges{font-size:11px;color:var(--text3);margin-bottom:8px;}
.lane-comp{padding:5px 8px;background:var(--bg4);border-radius:5px;font-size:12px;margin-bottom:4px;}

/* LANDING */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;gap:32px;}
.landing-logo{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:var(--blue);text-shadow:0 0 60px rgba(0,200,255,0.3);letter-spacing:6px;}
.landing-logo span{color:var(--gold);}
.landing-sub{font-size:15px;color:var(--text2);max-width:480px;line-height:1.7;}
.role-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;max-width:1000px;width:100%;}
.role-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:28px 20px;cursor:pointer;transition:all .2s;text-align:center;}
.role-card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,200,255,0.1);}
.role-icon{font-size:40px;margin-bottom:14px;}
.role-name{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:1px;}
.role-desc{font-size:12px;color:var(--text2);line-height:1.5;}

/* PIN SCREEN */
.pin-screen{max-width:360px;margin:60px auto;text-align:center;}
.pin-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;margin-bottom:8px;color:var(--blue);}
.pin-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
.pin-input{text-align:center;font-family:'Space Mono',monospace;font-size:32px;letter-spacing:12px;padding:16px;background:var(--bg3);border:2px solid var(--border2);border-radius:12px;color:var(--text);width:100%;margin-bottom:16px;}
.pin-input:focus{border-color:var(--blue);}
.pin-error{color:var(--red);font-size:13px;margin-bottom:12px;}

/* SETUP WIZARD */
.wizard-steps{display:flex;gap:0;margin-bottom:28px;border-radius:var(--r2);overflow:hidden;border:1px solid var(--border);}
.wizard-step{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:600;background:var(--bg3);color:var(--text3);border-right:1px solid var(--border);transition:all .15s;}
.wizard-step:last-child{border-right:none;}
.wizard-step.done{background:rgba(0,232,122,0.08);color:var(--green);}
.wizard-step.active{background:rgba(0,200,255,0.1);color:var(--blue);}

/* PROGRESS */
.progress{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:8px;}
.progress-bar{height:100%;background:var(--blue);transition:width .3s;}

/* TOAST */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 18px;border-radius:var(--r3);font-size:13px;font-weight:600;min-width:220px;box-shadow:var(--shadow);animation:toast-in .2s ease;border-left:4px solid;}
.toast-success{background:var(--bg2);border-color:var(--green);color:var(--green);}
.toast-error{background:var(--bg2);border-color:var(--red);color:var(--red);}
.toast-info{background:var(--bg2);border-color:var(--blue);color:var(--blue);}
.toast-warn{background:var(--bg2);border-color:var(--gold);color:var(--gold);}
@keyframes toast-in{from{transform:translateX(40px);opacity:0;}to{transform:none;opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* FLYOFF ALERT */
.flyoff-banner{background:linear-gradient(135deg,rgba(155,109,255,0.15),rgba(245,166,35,0.1));border:1px solid var(--purple);border-radius:var(--r);padding:20px;margin-bottom:20px;}
.flyoff-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--purple);margin-bottom:10px;}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:20px 0;}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5;}
.empty-text{font-size:14px;}

/* UTILS */
.flex{display:flex;} .flex-col{flex-direction:column;} .items-center{align-items:center;} .justify-between{justify-content:space-between;} .gap-2{gap:8px;} .gap-3{gap:12px;} .gap-4{gap:16px;} .flex-wrap{flex-wrap:wrap;} .flex-1{flex:1;} .mt-1{margin-top:4px;} .mt-2{margin-top:8px;} .mt-3{margin-top:12px;} .mt-4{margin-top:16px;} .mb-2{margin-bottom:8px;} .mb-3{margin-bottom:12px;} .mb-4{margin-bottom:16px;} .text-sm{font-size:12px;} .text-xs{font-size:11px;} .text-gold{color:var(--gold);} .text-blue{color:var(--blue);} .text-green{color:var(--green);} .text-red{color:var(--red);} .text-muted{color:var(--text2);} .font-mono{font-family:'Space Mono',monospace;} .font-orb{font-family:'Orbitron',monospace;} .bold{font-weight:700;} .text-center{text-align:center;} .text-right{text-align:right;} .w-full{width:100%;} .hidden{display:none !important;}

/* RESPONSIVE */
@media(max-width:768px){
  .main{padding:10px;}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  .form-row,.form-row-3{grid-template-columns:1fr;}
  .topbar-nav{display:none;}
  .timer-display{font-size:56px;}
  .landing-logo{font-size:32px;}
  .role-cards{grid-template-columns:1fr!important;max-width:100%!important;}
  .role-card{padding:18px 16px;display:flex;align-items:center;gap:14px;text-align:left!important;}
  .role-icon{font-size:28px;margin-bottom:0!important;min-width:36px;}
  .role-name{font-size:13px;margin-bottom:2px;}
  .role-desc{font-size:11px;}
  .tabs{gap:1px;overflow-x:auto;flex-wrap:nowrap;padding:3px;}
  .tab{padding:7px 10px;font-size:11px;white-space:nowrap;}
  .timer-btn{padding:16px 20px;font-size:13px;min-width:100px;}
  .competitor-chip{padding:12px 10px;}
  .chip-name{font-size:13px;}
  .tbl-wrap{font-size:12px;}
  td,th{padding:8px 10px;}
  .card{padding:14px;}
  .card-header{margin-bottom:10px;padding-bottom:8px;}
  /* Topbar compact */
  .topbar{padding:0 12px;height:52px;}
  .topbar-logo{font-size:14px;}
  .topbar-comp{font-size:11px;}
  .topbar-role{font-size:10px;padding:3px 8px;}
  /* Judge panel full width on mobile */
  .grid-2{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .timer-display{font-size:52px;letter-spacing:2px;}
  .timer-btn{padding:18px 16px;font-size:14px;flex:1;}
  .timer-controls{gap:8px;}
  .landing-logo{font-size:28px;letter-spacing:4px;}
  .main{padding:8px;}
  .tab{padding:6px 8px;font-size:10px;}
  /* Make start/stop buttons full width on phone */
  .timer-controls{flex-direction:column;align-items:stretch;}
  .timer-btn{min-width:unset;width:100%;}
}

/* ☀️ DAYLIGHT MODE — hakem ekranına özel */
body.daylight-mode {
  background:#F5F7FA !important;
}
body.daylight-mode .app-shell { background:#F5F7FA; }
body.daylight-mode .topbar { background:#FFFFFF; border-bottom:2px solid #1565C0; }

<script>
// ==================== SUPABASE CONFIG ====================
const SB_URL = 'https://pbfcrplortvavqcapouy.supabase.co';
const SB_KEY = 'sb_publishable_yLYb3DgyYF72hInxvNNIoQ_Mh1hATJB';
const SB_H = {
  'Content-Type':'application/json',
  'apikey':SB_KEY,
  'Authorization':'Bearer '+SB_KEY,
  'Prefer':'resolution=merge-duplicates'
};
async function sbGet(table,filter=''){
  try{const r=await fetch(`${SB_URL}/rest/v1/${table}${filter}`,{headers:SB_H});return r.ok?await r.json():null;}catch(e){return null;}
}
async function sbUpsert(table,data){
  try{const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:SB_H,body:JSON.stringify(data)});return r.ok;}catch(e){return false;}
}
async function sbDelete(table,filter){
  try{const r=await fetch(`${SB_URL}/rest/v1/${table}${filter}`,{method:'DELETE',headers:SB_H});return r.ok;}catch(e){return false;}
}

// ==================== STATE ====================
const CATS = ['F1A','F1B','F1C','F1G','F1H','F1Q','P30','F2A','F2B','F2C','F3A','F3B','F3D','F3F'];
function uid(){return 'id_'+Math.random().toString(36).substr(2,9)+'_'+Date.now();}

// ---- ADMIN ----
function loadAdmin(){try{return JSON.parse(localStorage.getItem('ffco_admin')||'null');}catch(e){return null;}}
function saveAdmin(a){
  localStorage.setItem('ffco_admin',JSON.stringify(a));
  sbUpsert('ffco_kv',{key:'admin',value:a,updated_at:new Date().toISOString()}).then(ok=>ok?syncOK():syncERR());
}
function saveAdminAcc(a){saveAdmin(a);}
function getAdmin(){return loadAdmin()||{pin:'admin1234',name:'Admin'};}
function isAdminSetup(){return !!loadAdmin();}

// ---- ORGANIZERS ----
function loadOrganizers(){try{return JSON.parse(localStorage.getItem('ffco_organizers')||'[]');}catch(e){return[];}}
function saveOrganizers(o){
  localStorage.setItem('ffco_organizers',JSON.stringify(o));
  sbUpsert('ffco_kv',{key:'organizers',value:o,updated_at:new Date().toISOString()}).then(ok=>ok?syncOK():syncERR());
}
function findOrgByCredentials(username,pin){
  return loadOrganizers().find(o=>o.pin===pin&&o.active!==false);
}

// ---- COMPETITION INDEX ----
function loadIndex(){try{return JSON.parse(localStorage.getItem('ffco_index')||'[]');}catch(e){return[];}}
function saveIndex(idx){
  localStorage.setItem('ffco_index',JSON.stringify(idx));
  sbUpsert('ffco_kv',{key:'index',value:idx,updated_at:new Date().toISOString()}).then(ok=>ok?syncOK():syncERR());
}

// ---- COMPETITION DATA ----
function getInitialState(compId){
  const id=compId||uid();
  return{
    competition:{id,name:'',location:'',dateStart:'',dateEnd:'',categories:[],customCategories:[],bulletinUrl:'',bulletinUrlEn:'',organizerPin:'1234',judgePrefix:'4321',createdAt:new Date().toISOString()},
    rounds:[],competitors:[],judges:[],lanes:[],scores:[],logs:[],
    setupComplete:false,extraFlightRequests:[]
  };
}
function loadComp(id){try{const s=localStorage.getItem('ffco_comp_'+id);return s?JSON.parse(s):null;}catch(e){return null;}}
function saveComp(id,state){
  localStorage.setItem('ffco_comp_'+id,JSON.stringify(state));
  const idx=loadIndex();const entry=idx.find(e=>e.id===id)||{};
  const meta={name:state.competition.name||'',organizerId:entry.organizerId||'admin',organizerName:entry.organizerName||'',dateStart:state.competition.dateStart||'',location:state.competition.location||'',archived:entry.archived||false,archivedAt:entry.archivedAt||null,createdAt:entry.createdAt||new Date().toISOString()};
  sbUpsert('ffco_comps',{id,meta,data:state,updated_at:new Date().toISOString()}).then(ok=>ok?syncOK():syncERR());
}
function deleteComp(id){
  localStorage.removeItem('ffco_comp_'+id);
  sbDelete('ffco_comps',`?id=eq.${id}`);
}

// ---- ACTIVE SESSION ----
let ACTIVE_COMP_ID=sessionStorage.getItem('ffco_active_comp')||null;
let ACTIVE_ORG_ID=sessionStorage.getItem('ffco_active_org')||null;
let CURRENT_ORG_ID=ACTIVE_ORG_ID||null;
let STATE=ACTIVE_COMP_ID?loadComp(ACTIVE_COMP_ID)||getInitialState():getInitialState();

function save(){
  if(ACTIVE_COMP_ID){
    STATE.competition.updatedAt=new Date().toISOString();
    saveComp(ACTIVE_COMP_ID,STATE);
    const idx=loadIndex();
    const entry=idx.find(e=>e.id===ACTIVE_COMP_ID);
    if(entry){entry.name=STATE.competition.name;entry.dateStart=STATE.competition.dateStart;entry.location=STATE.competition.location;}
    saveIndex(idx);
  }
}
function selectComp(id){
  ACTIVE_COMP_ID=id;sessionStorage.setItem('ffco_active_comp',id);
  STATE=loadComp(id)||getInitialState(id);
}
function createNewComp(){
  const id=uid();saveComp(id,getInitialState(id));
  const idx=loadIndex();
  const org=CURRENT_ROLE==='admin'?{id:'admin',name:'Admin'}:loadOrganizers().find(o=>o.id===ACTIVE_ORG_ID)||{id:ACTIVE_ORG_ID,name:'?'};
  idx.push({id,name:'Yeni Yarışma',dateStart:'',location:'',organizerId:org.id,organizerName:org.name,archived:false,createdAt:new Date().toISOString()});
  saveIndex(idx);return id;
}
function archiveComp(id){
  const idx=loadIndex();const e=idx.find(x=>x.id===id);
  if(e){e.archived=true;e.archivedAt=new Date().toISOString();}
  saveIndex(idx);
  const comp=loadComp(id);if(comp)saveComp(id,comp);
  if(ACTIVE_COMP_ID===id){ACTIVE_COMP_ID=null;sessionStorage.removeItem('ffco_active_comp');STATE=getInitialState();}
  navigate('comp-select');toast(t('archivedSuccess'),'info');
}
function unarchiveComp(id){
  const idx=loadIndex();const e=idx.find(x=>x.id===id);
  if(e){e.archived=false;delete e.archivedAt;}
  saveIndex(idx);const comp=loadComp(id);if(comp)saveComp(id,comp);
  navigate('comp-select');toast(t('unarchiveSuccess'),'success');
}
function hardDeleteComp(id){
  const comp=loadComp(id);const name=comp?.competition?.name||'Bu yarışma';
  if(!confirm(`"${name}" yarışmasını kalıcı olarak silmek istiyor musunuz?`)) return;
  saveIndex(loadIndex().filter(e=>e.id!==id));deleteComp(id);
  if(ACTIVE_COMP_ID===id){ACTIVE_COMP_ID=null;sessionStorage.removeItem('ffco_active_comp');STATE=getInitialState();}
  navigate('comp-select');toast(t('deleted'),'info');
}

// ---- SYNC INDICATOR ----
function syncOK(){
  const el=document.getElementById('syncDot');
  if(el){
    el.style.background='#00E87A';
    el.style.boxShadow='0 0 6px #00E87A';
    el.title='Kaydedildi ✓';
    setTimeout(()=>{el.style.background='#2a3d5a';el.style.boxShadow='none';},2500);
  }
}
function syncERR(){
  const el=document.getElementById('syncDot');
  if(el){
    el.style.background='#FF4757';
    el.style.boxShadow='0 0 6px #FF4757';
    el.title='Bağlantı hatası!';
    setTimeout(()=>{el.style.background='#2a3d5a';el.style.boxShadow='none';},5000);
  }
}

// ---- STARTUP SYNC ----
async function startupSync(){
  document.getElementById('mainContent').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;"><div style="font-family:'Orbitron',monospace;font-size:16px;color:var(--blue);letter-spacing:3px;">FFCO</div><div style="width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;"></div><div style="font-size:12px;color:var(--text2);">Veriler yükleniyor...</div></div>`;
  try{
    const adminRows=await sbGet('ffco_kv','?key=eq.admin');
    if(adminRows&&adminRows.length>0) localStorage.setItem('ffco_admin',JSON.stringify(adminRows[0].value));
    const orgRows=await sbGet('ffco_kv','?key=eq.organizers');
    if(orgRows&&orgRows.length>0) localStorage.setItem('ffco_organizers',JSON.stringify(orgRows[0].value));

    const sbRows=await sbGet('ffco_comps','?select=id,meta,data,updated_at');
    if(sbRows&&sbRows.length>0){
      const idx=[];
      sbRows.forEach(r=>{
        idx.push({id:r.id,...r.meta});
        const localKey='ffco_comp_'+r.id;
        const localRaw=localStorage.getItem(localKey);
        if(!localRaw){
          localStorage.setItem(localKey,JSON.stringify(r.data));
        } else {
          const localData=JSON.parse(localRaw);
          const localTs=localData.competition?.updatedAt||localData.competition?.createdAt||'';
          const sbTs=r.updated_at||'';
          if(sbTs>localTs){
            localStorage.setItem(localKey,JSON.stringify(r.data));
          }
        }
      });
      const localIdx=JSON.parse(localStorage.getItem('ffco_index')||'[]');
      localIdx.forEach(le=>{if(!idx.find(e=>e.id===le.id))idx.push(le);});
      localStorage.setItem('ffco_index',JSON.stringify(idx));
    }

    if(ACTIVE_COMP_ID) STATE=loadComp(ACTIVE_COMP_ID)||getInitialState();
  }catch(e){toast('Supabase bağlantısı kurulamadı — yerel veri kullanılıyor','warn');}
  renderApp();
}

let CURRENT_ROLE='public';
let CURRENT_JUDGE_ID=null;

function checkJudgePin(pin){
  const idx=loadIndex();
  for(const entry of idx){
    const comp=loadComp(entry.id);
    if(!comp) continue;
    const j=comp.judges.find(j=>j.pin===pin);
    if(j){
      CURRENT_JUDGE_ID=j.id;
      judgeLoginWithSync(entry.id,j.id);
      return true;
    }
  }
  return false;
}
async function judgeLoginWithSync(compId,judgeId){
  CURRENT_ROLE='judge';
  CURRENT_JUDGE_ID=judgeId;
  document.getElementById('mainContent').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;">
      <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;"></div>
      <div style="font-size:12px;color:var(--text2);">Yarışma verisi güncelleniyor...</div>
    </div>`;
  try{
    const rows=await sbGet('ffco_comps',`?id=eq.${compId}`);
    if(rows&&rows.length>0){
      localStorage.setItem('ffco_comp_'+compId,JSON.stringify(rows[0].data));
    }
  }catch(e){}
  selectComp(compId);
  navigate('judge');
}

let CURRENT_VIEW='landing';

function renderApp(){
  updateTopbar();
  const main=document.getElementById('mainContent');
  switch(CURRENT_VIEW){
    case 'landing':      main.innerHTML=renderLanding(); break;
    case 'login-select': main.innerHTML=renderLoginSelect(); break;
    case 'participants': main.innerHTML=renderParticipants(); break;
    case 'admin-pin':    main.innerHTML=renderAdminPin(); break;
    case 'admin':        main.innerHTML=renderAdmin(); break;
    case 'org-login':    main.innerHTML=renderOrgLogin(); break;
    case 'org-register': main.innerHTML=renderOrgRegister(); break;
    case 'judge-pin':    main.innerHTML=renderJudgeCompSelect(); break;
    case 'comp-select':  main.innerHTML=renderCompSelect(); break;
    case 'organizer':    main.innerHTML=renderOrganizer(); bindOrgEvents(); break;
    case 'judge':        main.innerHTML=renderJudge(); bindJudgeEvents(); break;
    case 'scoreboard':   main.innerHTML=renderScoreboard(); break;
    case 'register':     main.innerHTML=renderPublicRegister(); break;
    case 'org-apply':    main.innerHTML=renderOrgApply(); break;
    default:             main.innerHTML=renderLanding();
  }
}

function updateTopbar(){
  const comp=STATE.competition;
  document.getElementById('topbarComp').textContent=comp.name||'Free Flight Competition Organizer';
  const nav=document.getElementById('topbarNav');
  const roleEl=document.getElementById('topbarRole');
  ['TR','EN'].forEach(l=>{
    const btn=document.getElementById('lang'+l);
    if(btn){btn.style.background=CURRENT_LANG===l.toLowerCase()?'var(--blue)':'transparent';btn.style.color=CURRENT_LANG===l.toLowerCase()?'#000':'var(--text2)';}
  });
  if(CURRENT_ROLE==='admin'){
    nav.innerHTML=`
      <button class="nav-btn ${CURRENT_VIEW==='admin'?'active':''}" onclick="navigate('admin')">👑 Admin</button>
      ${ACTIVE_COMP_ID?`<button class="nav-btn ${CURRENT_VIEW==='organizer'?'active':''}" onclick="navigate('organizer')">📋 Yönetim</button>`:''}
      <button class="nav-btn ${CURRENT_VIEW==='scoreboard'?'active':''}" onclick="navigate('scoreboard')">🏆 Sonuçlar</button>
    `;
    roleEl.textContent='👑 Admin';roleEl.style.color='var(--purple)';
  } else if(CURRENT_ROLE==='organizer'){
    const org=ACTIVE_ORG_ID?loadOrganizers().find(o=>o.id===ACTIVE_ORG_ID):null;
    nav.innerHTML=`
      <button class="nav-btn" onclick="navigate('comp-select')">◀ ${t('competitions_title')}</button>
      <button class="nav-btn ${CURRENT_VIEW==='organizer'?'active':''}" onclick="navigate('organizer')">📋 ${t('management')}</button>
      <button class="nav-btn ${CURRENT_VIEW==='scoreboard'?'active':''}" onclick="navigate('scoreboard')">🏆 ${t('results')}</button>
    `;
    roleEl.textContent='👤 '+(org?org.name:'Organizatör');roleEl.style.color='var(--gold)';
  } else if(CURRENT_ROLE==='judge'){
    const j=STATE.judges.find(j=>j.id===CURRENT_JUDGE_ID);
    nav.innerHTML=`
      <button class="nav-btn ${CURRENT_VIEW==='judge'?'active':''}" onclick="navigate('judge')">⏱ ${t('judge')}</button>
      <button class="nav-btn ${CURRENT_VIEW==='scoreboard'?'active':''}" onclick="navigate('scoreboard')">🏆 ${t('results')}</button>
    `;
    roleEl.textContent='⚖️ '+(j?j.name:t('judge'));roleEl.style.color='var(--blue)';
  } else {
    nav.innerHTML=`
      <button class="nav-btn ${CURRENT_VIEW==='scoreboard'?'active':''}" onclick="navigate('scoreboard')">🏆 ${t('results')}</button>
      <button class="nav-btn ${CURRENT_VIEW==='participants'?'active':''}" onclick="navigate('participants')">👥 ${CURRENT_LANG==='en'?'Participants':'Katılımcılar'}</button>
      <button class="nav-btn ${CURRENT_VIEW==='register'?'active':''}" onclick="navigate('register')">📝 ${t('register')}</button>
    `;
    roleEl.textContent='🔄 '+t('switchRole');roleEl.style.color='var(--text2)';
  }
}

function renderPartContent(compId){
  const ps=loadComp(compId);if(!ps) return '';
  const flightCats=['F1A','F1B','F1C','F1G','F1H','F1Q','P30','F2A','F2B','F2C','F3A','F3B','F3D','F3F'];
  if(PART_TAB==='competitors'){
    const comps=ps.competitors.filter(c=>c.categories.some(cat=>flightCats.includes(cat)));
    if(!comps.length) return `<div class="empty"><div class="empty-icon">🏅</div><div class="empty-text">${CURRENT_LANG==='en'?'No competitors registered yet':'Henüz yarışmacı kaydı yok'}</div></div>`;
    const catGroups={};
    ps.competition.categories.filter(c=>flightCats.includes(c)).forEach(cat=>{
      const catComps=comps.filter(c=>c.categories.includes(cat));
      if(catComps.length>0) catGroups[cat]=catComps;
    });
    return Object.entries(catGroups).map(([cat,list])=>`
      <div class="mb-4">
        <div style="font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--blue);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);">
          ${cat} — ${list.length} ${CURRENT_LANG==='en'?'competitor':'yarışmacı'}
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>#</th>
              <th>${CURRENT_LANG==='en'?'Name':'Ad Soyad'}</th>
              <th>${CURRENT_LANG==='en'?'Country':'Ülke'}</th>
              <th>FAI ID</th>
              <th>THSF No</th>
              <th>${CURRENT_LANG==='en'?'Class':'Sınıf'}</th>
            </tr></thead>
            <tbody>
              ${list.map((c,i)=>`<tr>
                <td style="color:var(--text3)">${i+1}</td>
                <td><strong>${c.name} ${c.surname}</strong></td>
                <td>${c.country||'—'}</td>
                <td class="font-mono">${c.faiId||'—'}</td>
                <td class="font-mono">${c.thsfId||'—'}</td>
                <td>${c.senior===false?`<span class="badge badge-purple">Junior</span>`:`<span class="badge badge-gray">Senior</span>`}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`).join('');
  } else {
    const officials=[];
    ps.judges.forEach(j=>{
      officials.push({
        name:j.name,
        role:CURRENT_LANG==='en'?'Timekeeper':'Hakem',
        roleDetail:j.category?'('+j.category+')':'',
        country:j.country||'—'
      });
    });
    ps.competitors
      .filter(c=>c.categories.length>0&&c.categories.every(cat=>!flightCats.includes(cat)))
      .forEach(c=>{
        const fullName=(c.name+' '+c.surname).trim();
        if(!officials.find(o=>o.name===fullName)){
          officials.push({name:fullName,role:c.categories.join(', '),roleDetail:'',country:c.country||'—'});
        }
      });
    if(!officials.length) return `<div class="empty"><div class="empty-icon">⚖️</div><div class="empty-text">${CURRENT_LANG==='en'?'No officials registered yet':'Henüz görevli kaydı yok'}</div></div>`;
    return `<div class="tbl-wrap"><table>
      <thead><tr>
        <th>#</th>
        <th>${CURRENT_LANG==='en'?'Name':'Ad Soyad'}</th>
        <th>${CURRENT_LANG==='en'?'Role':'Görev'}</th>
        <th>${CURRENT_LANG==='en'?'Country':'Ülke'}</th>
      </tr></thead>
      <tbody>
        ${officials.map((o,i)=>`<tr>
          <td style="color:var(--text3)">${i+1}</td>
          <td><strong>${o.name}</strong></td>
          <td><span class="badge badge-blue">${o.role}</span>${o.roleDetail?`<span class="text-xs text-muted" style="margin-left:4px">${o.roleDetail}</span>`:''}</td>
          <td>${o.country||'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  }
}

async function submitOrgApply(){
  const name=document.getElementById('oa-name').value.trim();
  const email=document.getElementById('oa-email').value.trim();

  if(!name||!email||!comp){toast(CURRENT_LANG==='en'?'Fill required fields':'Zorunlu alanları doldurun','error');return;}

}

async function approveOrgApp(appId){
  const apps = (await sbGet('ffco_kv','?key=eq.org_applications'))[0]?.value || [];
  const app = apps.find(a=>a.id===appId);
  if(!app) return;
  const pin = Math.floor(1000+Math.random()*9000).toString();
  const orgs = loadOrganizers();
  orgs.push({id:uid(),name:app.name,pin,createdAt:new Date().toISOString()});
  saveOrganizers(orgs);
  app.status='approved';
  await sbUpsert('ffco_kv',{key:'org_applications',value:apps,updated_at:new Date().toISOString()});
  openModal(t('accountCreated'),`PIN: ${pin}`,`<button onclick="closeModal()">${t('okNoted')}</button>`);
  adminTab('applications',document.querySelector('[onclick*="applications"]'));
}

startupSync();
</script>
</body>
</html>
